<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f0e17" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PDF Reader" />
  <meta name="description" content="Leitor e gerenciador de PDFs" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>PDF·Leitor</title>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');

    :root {
      --bg:       #0f0e17;
      --surface:  #1a1928;
      --card:     #22213a;
      --accent:   #ff6b35;
      --accent2:  #e84855;
      --text:     #fffffe;
      --muted:    #a7a9be;
      --border:   #2e2d4a;
      --success:  #2cb67d;
      --radius:   14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15,14,23,.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
      flex: 1;
    }
    .logo span { color: var(--accent); }

    #btn-open {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 9px 18px;
      border-radius: 50px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity .2s, transform .15s;
      white-space: nowrap;
    }
    #btn-open:active { transform: scale(.95); opacity: .9; }

    /* ── Library ── */
    #library {
      padding: 20px 16px;
    }

    .section-label {
      font-family: 'Space Mono', monospace;
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    #file-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .file-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: background .2s, border-color .2s, transform .15s;
      animation: fadeUp .3s ease both;
    }
    .file-card:active { transform: scale(.98); }
    .file-card:hover  { border-color: var(--accent); background: #2a2840; }

    .file-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #2a1a10, #3d1f0f);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1.3rem;
    }

    .file-info { flex: 1; overflow: hidden; }
    .file-name {
      font-size: .92rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-meta {
      font-size: .75rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .file-actions {
      display: flex;
      gap: 6px;
    }
    .icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .85rem;
      transition: all .2s;
    }
    .icon-btn:hover, .icon-btn:active { color: var(--accent); border-color: var(--accent); }
    .icon-btn.del:hover, .icon-btn.del:active { color: var(--accent2); border-color: var(--accent2); }

    /* ── Empty state ── */
    #empty-state {
      text-align: center;
      padding: 60px 20px;
    }
    .empty-icon {
      font-size: 4rem;
      margin-bottom: 16px;
      filter: grayscale(.5);
    }
    .empty-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    .empty-sub { font-size: .85rem; color: var(--muted); line-height: 1.5; }

    /* ── Reader overlay ── */
    #reader-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: var(--bg);
      flex-direction: column;
    }
    #reader-overlay.open { display: flex; }

    #reader-header {
      background: rgba(15,14,23,.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    #back-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      width: 38px;
      height: 38px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      transition: all .2s;
      flex-shrink: 0;
    }
    #back-btn:active { transform: scale(.9); }

    #reader-title {
      flex: 1;
      font-size: .88rem;
      font-weight: 600;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    #download-btn {
      background: var(--success);
      border: none;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: .8rem;
      font-weight: 600;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: opacity .2s, transform .15s;
      flex-shrink: 0;
    }
    #download-btn:active { transform: scale(.95); opacity: .85; }

    /* ── Page info bar ── */
    #page-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .nav-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      font-size: .9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
    }
    .nav-btn:disabled { opacity: .3; cursor: default; }
    .nav-btn:not(:disabled):active { transform: scale(.9); border-color: var(--accent); }

    #page-info {
      font-family: 'Space Mono', monospace;
      font-size: .75rem;
      color: var(--muted);
      flex: 1;
      text-align: center;
    }

    .zoom-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
    }
    .zoom-btn:active { transform: scale(.9); }

    #zoom-label {
      font-family: 'Space Mono', monospace;
      font-size: .7rem;
      color: var(--muted);
      min-width: 36px;
      text-align: center;
    }

    /* ── Canvas area ── */
    #canvas-container {
      flex: 1;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 16px;
      background: #0a0910;
    }

    #pdf-canvas {
      display: block;
      max-width: 100%;
      border-radius: 6px;
      box-shadow: 0 4px 40px rgba(0,0,0,.6);
    }

    #loading-spinner {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 40px;
      color: var(--muted);
      font-size: .85rem;
    }
    #loading-spinner.show { display: flex; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 50px;
      font-size: .82rem;
      opacity: 0;
      transition: all .3s ease;
      z-index: 999;
      white-space: nowrap;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Progress bar (load) ── */
    #progress-bar {
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%;
      transition: width .3s;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- Hidden file input -->
<input type="file" id="file-input" accept=".pdf,application/pdf" style="display:none" multiple />

<!-- ── Main screen ── -->
<header>
  <div class="logo">PDF<span>·</span>Leitor</div>
  <button id="btn-open" onclick="document.getElementById('file-input').click()">
    <span>＋</span> Abrir PDF
  </button>
</header>

<div id="library">
  <div class="section-label">Biblioteca</div>
  <div id="file-list"></div>
  <div id="empty-state">
    <div class="empty-icon">📂</div>
    <div class="empty-title">Nenhum PDF aberto</div>
    <div class="empty-sub">Toque em <strong>+ Abrir PDF</strong> para carregar<br>arquivos do seu dispositivo.</div>
  </div>
</div>

<!-- ── Reader overlay ── -->
<div id="reader-overlay">
  <div id="reader-header">
    <button id="back-btn" onclick="closeReader()">←</button>
    <div id="reader-title">—</div>
    <button id="download-btn" onclick="downloadCurrent()">⬇ Baixar</button>
  </div>
  <div id="progress-bar"></div>
  <div id="page-bar">
    <button class="nav-btn" id="prev-btn" onclick="changePage(-1)">‹</button>
    <div id="page-info">— / —</div>
    <button class="nav-btn" id="next-btn" onclick="changePage(1)">›</button>
    <button class="zoom-btn" onclick="changeZoom(-0.2)">−</button>
    <div id="zoom-label">100%</div>
    <button class="zoom-btn" onclick="changeZoom(0.2)">+</button>
  </div>
  <div id="canvas-container">
    <div id="loading-spinner" class="show">
      <div class="spinner"></div>
      <span>Carregando PDF…</span>
    </div>
    <canvas id="pdf-canvas"></canvas>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  // Configure PDF.js worker
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  // ── State ──
  let files = [];          // {name, size, data: ArrayBuffer, url: ObjectURL}
  let currentFile = null;
  let pdfDoc = null;
  let currentPage = 1;
  let zoom = 1.2;
  let renderTask = null;

  // ── File input ──
  document.getElementById('file-input').addEventListener('change', async (e) => {
    const selected = Array.from(e.target.files);
    e.target.value = '';
    for (const f of selected) {
      if (f.type !== 'application/pdf' && !f.name.endsWith('.pdf')) {
        toast('⚠ Apenas arquivos PDF são aceitos');
        continue;
      }
      const buf = await f.arrayBuffer();
      const url = URL.createObjectURL(new Blob([buf], {type:'application/pdf'}));
      const exists = files.findIndex(x => x.name === f.name && x.size === f.size);
      if (exists > -1) { toast('Arquivo já adicionado'); continue; }
      files.push({ name: f.name, size: f.size, buf, url });
      toast(`✓ ${f.name}`);
    }
    renderLibrary();
  });

  // ── Library ──
  function renderLibrary() {
    const list = document.getElementById('file-list');
    const empty = document.getElementById('empty-state');
    list.innerHTML = '';
    if (!files.length) { empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    files.forEach((f, i) => {
      const card = document.createElement('div');
      card.className = 'file-card';
      card.innerHTML = `
        <div class="file-icon">📄</div>
        <div class="file-info">
          <div class="file-name">${escHtml(f.name)}</div>
          <div class="file-meta">${formatSize(f.size)}</div>
        </div>
        <div class="file-actions" onclick="event.stopPropagation()">
          <button class="icon-btn" title="Baixar" onclick="downloadFile(${i})">⬇</button>
          <button class="icon-btn del" title="Remover" onclick="removeFile(${i})">✕</button>
        </div>`;
      card.addEventListener('click', () => openReader(i));
      list.appendChild(card);
    });
  }

  function removeFile(i) {
    URL.revokeObjectURL(files[i].url);
    files.splice(i, 1);
    renderLibrary();
    toast('Arquivo removido');
  }

  // ── Reader ──
  async function openReader(i) {
    currentFile = files[i];
    currentPage = 1;
    zoom = 1.2;
    document.getElementById('reader-title').textContent = currentFile.name;
    document.getElementById('reader-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    await loadPDF();
  }

  function closeReader() {
    document.getElementById('reader-overlay').classList.remove('open');
    document.body.style.overflow = '';
    if (pdfDoc) { pdfDoc.destroy(); pdfDoc = null; }
  }

  async function loadPDF() {
    showSpinner(true);
    setProgress(0);
    try {
      const loadingTask = pdfjsLib.getDocument({ data: currentFile.buf.slice(0) });
      loadingTask.onProgress = ({ loaded, total }) => {
        if (total) setProgress(Math.round(loaded / total * 100));
      };
      pdfDoc = await loadingTask.promise;
      setProgress(100);
      updatePageInfo();
      await renderPage();
    } catch(e) {
      toast('Erro ao abrir PDF: ' + e.message);
      closeReader();
    } finally {
      showSpinner(false);
    }
  }

  async function renderPage() {
    if (!pdfDoc) return;
    if (renderTask) { renderTask.cancel(); renderTask = null; }
    const canvas = document.getElementById('pdf-canvas');
    const ctx = canvas.getContext('2d');
    const page = await pdfDoc.getPage(currentPage);
    const dpr = window.devicePixelRatio || 1;
    const vp = page.getViewport({ scale: zoom * dpr });
    canvas.width = vp.width;
    canvas.height = vp.height;
    canvas.style.width  = (vp.width  / dpr) + 'px';
    canvas.style.height = (vp.height / dpr) + 'px';
    renderTask = page.render({ canvasContext: ctx, viewport: vp });
    try { await renderTask.promise; } catch(e) { /* cancelled */ }
    updatePageInfo();
    document.getElementById('canvas-container').scrollTop = 0;
  }

  function changePage(delta) {
    if (!pdfDoc) return;
    const next = currentPage + delta;
    if (next < 1 || next > pdfDoc.numPages) return;
    currentPage = next;
    renderPage();
  }

  function changeZoom(delta) {
    zoom = Math.max(0.5, Math.min(3, zoom + delta));
    document.getElementById('zoom-label').textContent = Math.round(zoom * 100) + '%';
    renderPage();
  }

  function updatePageInfo() {
    if (!pdfDoc) return;
    document.getElementById('page-info').textContent =
      `Página ${currentPage} / ${pdfDoc.numPages}`;
    document.getElementById('prev-btn').disabled = currentPage <= 1;
    document.getElementById('next-btn').disabled = currentPage >= pdfDoc.numPages;
    document.getElementById('zoom-label').textContent = Math.round(zoom * 100) + '%';
  }

  // ── Download ──
  function downloadFile(i) {
    triggerDownload(files[i].url, files[i].name);
    toast('⬇ Baixando ' + files[i].name);
  }

  function downloadCurrent() {
    if (!currentFile) return;
    triggerDownload(currentFile.url, currentFile.name);
    toast('⬇ Baixando ' + currentFile.name);
  }

  function triggerDownload(url, name) {
    const a = document.createElement('a');
    a.href = url;
    a.download = name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  // ── Swipe gestures (mobile) ──
  let touchX = 0;
  document.getElementById('canvas-container').addEventListener('touchstart', e => {
    touchX = e.touches[0].clientX;
  }, { passive: true });
  document.getElementById('canvas-container').addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 60) changePage(dx < 0 ? 1 : -1);
  }, { passive: true });

  // ── Keyboard (desktop) ──
  document.addEventListener('keydown', e => {
    if (!pdfDoc) return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changePage(1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   changePage(-1);
    if (e.key === 'Escape') closeReader();
  });

  // ── Helpers ──
  function showSpinner(v) {
    const s = document.getElementById('loading-spinner');
    const c = document.getElementById('pdf-canvas');
    s.classList.toggle('show', v);
    c.style.display = v ? 'none' : 'block';
  }

  function setProgress(pct) {
    document.getElementById('progress-bar').style.width = pct + '%';
  }

  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
    return (bytes/1048576).toFixed(1) + ' MB';
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Service Worker (PWA) ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  renderLibrary();
</script>
</body>
</html>
