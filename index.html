<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f0e17" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PDF Reader" />
  <meta name="description" content="Leitor e gerenciador de PDFs" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>PDF·Leitor</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');

    :root {
      --bg:       #0f0e17;
      --surface:  #1a1928;
      --card:     #22213a;
      --accent:   #ff6b35;
      --accent2:  #e84855;
      --text:     #fffffe;
      --muted:    #a7a9be;
      --border:   #2e2d4a;
      --success:  #2cb67d;
      --info:     #7f5af0;
      --highlight:        rgba(255,200,0,0.38);
      --highlight-active: rgba(255,107,53,0.65);
      --sel-color:        rgba(100,160,255,0.35);
      --radius:   14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100dvh; overflow-x: hidden; }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(15,14,23,.88); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border); padding: 14px 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .logo { font-family: 'Space Mono', monospace; font-size: 1.15rem; font-weight: 700; letter-spacing: -.5px; color: var(--text); flex: 1; }
    .logo span { color: var(--accent); }
    #btn-open {
      background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; color: #fff;
      font-family: 'DM Sans', sans-serif; font-size: .85rem; font-weight: 600;
      padding: 9px 18px; border-radius: 50px; cursor: pointer;
      display: flex; align-items: center; gap: 6px; transition: opacity .2s, transform .15s; white-space: nowrap;
    }
    #btn-open:active { transform: scale(.95); opacity: .9; }

    /* ── Library ── */
    #library { padding: 20px 16px; }
    .section-label { font-family: 'Space Mono', monospace; font-size: .7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 14px; }
    #file-list { display: flex; flex-direction: column; gap: 10px; }
    .file-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px;
      display: flex; align-items: center; gap: 14px; cursor: pointer;
      transition: background .2s, border-color .2s, transform .15s; animation: fadeUp .3s ease both;
    }
    .file-card:active { transform: scale(.98); }
    .file-card:hover  { border-color: var(--accent); background: #2a2840; }
    .file-icon { width: 44px; height: 44px; background: linear-gradient(135deg,#2a1a10,#3d1f0f); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 1.3rem; }
    .file-info { flex: 1; overflow: hidden; }
    .file-name { font-size: .92rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-meta { font-size: .75rem; color: var(--muted); margin-top: 2px; }
    .file-actions { display: flex; gap: 6px; }
    .icon-btn { width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: .85rem; transition: all .2s; }
    .icon-btn:hover, .icon-btn:active { color: var(--accent); border-color: var(--accent); }
    .icon-btn.del:hover, .icon-btn.del:active { color: var(--accent2); border-color: var(--accent2); }

    /* ── Empty state ── */
    #empty-state { text-align: center; padding: 60px 20px; }
    .empty-icon { font-size: 4rem; margin-bottom: 16px; filter: grayscale(.5); }
    .empty-title { font-size: 1.1rem; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .empty-sub { font-size: .85rem; color: var(--muted); line-height: 1.5; }

    /* ── Reader overlay ── */
    #reader-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: var(--bg); flex-direction: column; }
    #reader-overlay.open { display: flex; }

    /* ── Reader header ── */
    #reader-header {
      background: rgba(15,14,23,.92); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border); padding: 10px 12px;
      display: flex; align-items: center; gap: 7px; flex-shrink: 0;
    }
    #back-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); width: 36px; height: 36px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; transition: all .2s; flex-shrink: 0; }
    #back-btn:active { transform: scale(.9); }
    #reader-title { flex: 1; font-size: .82rem; font-weight: 600; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

    /* header icon buttons */
    .hdr-btn {
      background: var(--card); border: 1px solid var(--border); color: var(--muted);
      width: 36px; height: 36px; border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 1rem;
      transition: all .2s; flex-shrink: 0;
    }
    .hdr-btn:active { transform: scale(.9); }
    .hdr-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(255,107,53,.12); }
    .hdr-btn.copy-mode { color: var(--info); border-color: var(--info); background: rgba(127,90,240,.12); }
    .hdr-btn.edit-mode { color: var(--success); border-color: var(--success); background: rgba(44,182,125,.12); }

    #download-btn {
      background: var(--success); border: none; color: #fff;
      font-family: 'DM Sans', sans-serif; font-size: .78rem; font-weight: 600;
      padding: 8px 11px; border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; gap: 4px; transition: opacity .2s, transform .15s; flex-shrink: 0;
    }
    #download-btn:active { transform: scale(.95); opacity: .85; }

    /* ── Page bar ── */
    #page-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 7px 12px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .nav-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-size: .9rem; display: flex; align-items: center; justify-content: center; transition: all .2s; }
    .nav-btn:disabled { opacity: .3; cursor: default; }
    .nav-btn:not(:disabled):active { transform: scale(.9); border-color: var(--accent); }
    #page-info { font-family: 'Space Mono', monospace; font-size: .72rem; color: var(--muted); flex: 1; text-align: center; }
    .zoom-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: all .2s; }
    .zoom-btn:active { transform: scale(.9); }
    #zoom-label { font-family: 'Space Mono', monospace; font-size: .68rem; color: var(--muted); min-width: 36px; text-align: center; }

    /* ── Canvas area ── */
    #canvas-container {
      flex: 1; overflow: auto; -webkit-overflow-scrolling: touch;
      display: flex; justify-content: center; align-items: flex-start;
      padding: 12px; background: #08070f; position: relative;
    }
    #canvas-wrapper { position: relative; display: inline-block; }
    #pdf-canvas { display: block; border-radius: 4px; box-shadow: 0 4px 40px rgba(0,0,0,.7); }

    /* ── Text layer (search highlights + selectable text) ── */
    #text-layer {
      position: absolute; top: 0; left: 0; pointer-events: none; overflow: hidden;
    }
    #text-layer .highlight { position: absolute; background: var(--highlight); border-radius: 2px; pointer-events: none; }
    #text-layer .highlight.active { background: var(--highlight-active); outline: 2px solid var(--accent); }

    /* ── Selectable text layer (copy mode) ── */
    #select-layer {
      position: absolute; top: 0; left: 0; overflow: hidden;
      display: none; cursor: text;
    }
    #select-layer.active { display: block; pointer-events: all; }
    #select-layer span {
      position: absolute; color: transparent; white-space: pre;
      cursor: text; user-select: text; -webkit-user-select: text;
      transform-origin: 0% 0%;
    }
    #select-layer span::selection { background: var(--sel-color); }

    /* ── Copy mode hint bar ── */
    #mode-hint {
      display: none; position: absolute; bottom: 16px; left: 50%;
      transform: translateX(-50%);
      background: rgba(127,90,240,.92); border: 1px solid var(--info);
      color: #fff; font-size: .8rem; font-weight: 600;
      padding: 8px 18px; border-radius: 50px;
      white-space: nowrap; z-index: 40; pointer-events: none;
      box-shadow: 0 4px 20px rgba(0,0,0,.5);
      animation: popIn .2s ease;
    }
    #mode-hint.show { display: block; }

    /* ── Copy action popup (appears after selection) ── */
    #copy-popup {
      display: none; position: fixed; z-index: 300;
      background: rgba(22,21,40,.98); border: 1px solid var(--info);
      border-radius: 12px; padding: 10px 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,.7);
      min-width: 220px; max-width: 90vw;
      animation: popIn .15s ease;
    }
    #copy-popup.show { display: block; }
    #copy-popup-text {
      font-size: .8rem; color: var(--muted); margin-bottom: 8px;
      max-height: 60px; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; font-family: 'Space Mono', monospace;
    }
    #copy-popup-btns { display: flex; gap: 8px; }
    .cp-btn {
      flex: 1; border: none; border-radius: 8px; padding: 8px 6px;
      font-family: 'DM Sans', sans-serif; font-size: .82rem; font-weight: 600;
      cursor: pointer; transition: opacity .2s, transform .15s;
    }
    .cp-btn:active { transform: scale(.95); opacity: .85; }
    .cp-btn.confirm { background: var(--info); color: #fff; }
    .cp-btn.cancel  { background: var(--card); color: var(--muted); border: 1px solid var(--border); }

    /* ── Edit overlay ── */
    #edit-overlay {
      display: none; position: fixed; inset: 0; z-index: 250;
      background: rgba(10,9,20,.96); flex-direction: column;
    }
    #edit-overlay.open { display: flex; }
    #edit-header {
      background: rgba(15,14,23,.95); border-bottom: 1px solid var(--border);
      padding: 12px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    #edit-header .title { flex: 1; font-size: .88rem; font-weight: 600; color: var(--success); }
    .edit-act-btn {
      border: none; border-radius: 8px; padding: 8px 14px;
      font-family: 'DM Sans', sans-serif; font-size: .82rem; font-weight: 600;
      cursor: pointer; transition: all .2s;
    }
    #edit-copy-all { background: var(--info); color: #fff; }
    #edit-close-btn { background: var(--card); border: 1px solid var(--border); color: var(--muted); }
    #edit-textarea {
      flex: 1; background: #0d0c1a; color: var(--text);
      border: none; outline: none; resize: none;
      font-family: 'DM Sans', sans-serif; font-size: .93rem; line-height: 1.65;
      padding: 20px; overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    #edit-footer {
      background: rgba(15,14,23,.95); border-top: 1px solid var(--border);
      padding: 10px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    #edit-info { flex: 1; font-size: .75rem; color: var(--muted); font-family: 'Space Mono', monospace; }
    #edit-save-btn { background: var(--success); color: #fff; border: none; border-radius: 8px; padding: 9px 20px; font-family: 'DM Sans', sans-serif; font-size: .85rem; font-weight: 600; cursor: pointer; transition: all .2s; }
    #edit-save-btn:active { transform: scale(.95); }

    /* ── Search bar (flutuante sobre o PDF) ── */
    #search-bar {
      display: none; position: absolute; top: 12px; right: 12px; z-index: 50;
      background: rgba(22,21,40,0.97); border: 1px solid var(--accent); border-radius: 12px;
      padding: 8px 10px; gap: 7px; align-items: center;
      box-shadow: 0 6px 32px rgba(0,0,0,.6);
      min-width: 280px; max-width: calc(100vw - 24px);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      animation: popIn .18s ease;
    }
    #search-bar.open { display: flex; }
    #search-input {
      flex: 1; background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 7px 10px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: .88rem; outline: none;
      transition: border-color .2s; min-width: 0;
    }
    #search-input:focus { border-color: var(--accent); }
    #search-input::placeholder { color: var(--muted); }
    #search-count { font-family: 'Space Mono', monospace; font-size: .68rem; color: var(--muted); white-space: nowrap; min-width: 44px; text-align: center; }
    .srch-nav { background: var(--card); border: 1px solid var(--border); color: var(--muted); width: 28px; height: 28px; border-radius: 7px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: .85rem; transition: all .2s; flex-shrink: 0; }
    .srch-nav:disabled { opacity: .3; cursor: default; }
    .srch-nav:not(:disabled):active { color: var(--accent); border-color: var(--accent); }
    #srch-close { background: none; border: none; color: var(--muted); width: 24px; height: 24px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; border-radius: 6px; transition: color .2s; flex-shrink: 0; padding: 0; }
    #srch-close:hover { color: var(--accent2); }

    /* ── Spinner / progress ── */
    #loading-spinner { display: none; flex-direction: column; align-items: center; gap: 12px; padding: 40px; color: var(--muted); font-size: .85rem; }
    #loading-spinner.show { display: flex; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
    #progress-bar { height: 3px; background: linear-gradient(90deg,var(--accent),var(--accent2)); width: 0%; transition: width .3s; flex-shrink: 0; }

    /* ── Toast ── */
    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px 20px; border-radius: 50px; font-size: .82rem; opacity: 0; transition: all .3s ease; z-index: 999; white-space: nowrap; pointer-events: none; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes fadeUp  { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes popIn   { from { opacity:0; transform:translateY(-8px) scale(.97); } to { opacity:1; transform:translateY(0) scale(1); } }
  </style>
</head>
<body>

<input type="file" id="file-input" accept=".pdf,application/pdf" style="display:none" multiple />

<!-- ── Main screen ── -->
<header>
  <div class="logo">PDF<span>·</span>Leitor</div>
  <button id="btn-open" onclick="document.getElementById('file-input').click()">
    <span>＋</span> Abrir PDF
  </button>
</header>

<div id="library">
  <div class="section-label">Biblioteca</div>
  <div id="file-list"></div>
  <div id="empty-state">
    <div class="empty-icon">📂</div>
    <div class="empty-title">Nenhum PDF aberto</div>
    <div class="empty-sub">Toque em <strong>+ Abrir PDF</strong> para carregar<br>arquivos do seu dispositivo.</div>
  </div>
</div>

<!-- ── Reader overlay ── -->
<div id="reader-overlay">
  <div id="reader-header">
    <button id="back-btn" onclick="closeReader()">←</button>
    <div id="reader-title">—</div>
    <!-- 🔍 Pesquisar -->
    <button class="hdr-btn" id="search-toggle-btn" title="Pesquisar (Ctrl+F)" onclick="toggleSearch()">🔍</button>
    <!-- 📋 Copiar texto -->
    <button class="hdr-btn" id="copy-toggle-btn"   title="Selecionar e copiar texto" onclick="toggleCopyMode()">📋</button>
    <!-- ✏️ Editar texto extraído -->
    <button class="hdr-btn" id="edit-toggle-btn"   title="Editar texto do PDF" onclick="openEditOverlay()">✏️</button>
    <button id="download-btn" onclick="downloadCurrent()">⬇ Baixar</button>
  </div>
  <div id="progress-bar"></div>

  <div id="page-bar">
    <button class="nav-btn" id="prev-btn" onclick="changePage(-1)">‹</button>
    <div id="page-info">— / —</div>
    <button class="nav-btn" id="next-btn" onclick="changePage(1)">›</button>
    <button class="zoom-btn" onclick="changeZoom(-0.15)">−</button>
    <div id="zoom-label">100%</div>
    <button class="zoom-btn" onclick="changeZoom(0.15)">+</button>
  </div>

  <div id="canvas-container" style="position:relative">
    <!-- Barra de pesquisa flutuante -->
    <div id="search-bar">
      <input id="search-input" type="search" placeholder="Pesquisar no PDF…"
             oninput="onSearchInput()" onkeydown="onSearchKey(event)" />
      <span id="search-count">—</span>
      <button class="srch-nav" id="srch-prev" title="Anterior" onclick="navigateMatch(-1)" disabled>↑</button>
      <button class="srch-nav" id="srch-next" title="Próximo"  onclick="navigateMatch(1)"  disabled>↓</button>
      <button id="srch-close" title="Fechar" onclick="toggleSearch()">✕</button>
    </div>

    <!-- Dica de modo cópia -->
    <div id="mode-hint">📋 Selecione o texto com o dedo e copie</div>

    <div id="loading-spinner" class="show">
      <div class="spinner"></div>
      <span>Carregando PDF…</span>
    </div>

    <div id="canvas-wrapper">
      <canvas id="pdf-canvas"></canvas>
      <!-- camada de destaques de busca -->
      <div id="text-layer"></div>
      <!-- camada de texto selecionável (modo cópia) -->
      <div id="select-layer"></div>
    </div>
  </div>
</div>

<!-- Popup de confirmação de cópia -->
<div id="copy-popup">
  <div id="copy-popup-text"></div>
  <div id="copy-popup-btns">
    <button class="cp-btn confirm" onclick="confirmCopy()">📋 Copiar</button>
    <button class="cp-btn cancel"  onclick="dismissCopyPopup()">Cancelar</button>
  </div>
</div>

<!-- ── Edit overlay ── -->
<div id="edit-overlay">
  <div id="edit-header">
    <span class="title">✏️ Texto extraído — Página <span id="edit-page-label">1</span></span>
    <button class="edit-act-btn" id="edit-copy-all" onclick="editCopyAll()">📋 Copiar tudo</button>
    <button class="edit-act-btn" id="edit-close-btn" onclick="closeEditOverlay()">✕ Fechar</button>
  </div>
  <textarea id="edit-textarea" spellcheck="false" placeholder="Extraindo texto do PDF…"></textarea>
  <div id="edit-footer">
    <span id="edit-info">—</span>
    <button id="edit-save-btn" onclick="editSave()">💾 Salvar .txt</button>
  </div>
</div>

<div id="toast"></div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  // ── State ──
  let files         = [];
  let currentFile   = null;
  let pdfDoc        = null;
  let currentPage   = 1;
  let zoom          = 1.0;
  let renderTask    = null;
  let copyModeOn    = false;
  let pendingCopy   = '';

  // Search state
  let searchMatches  = [];
  let searchMatchIdx = -1;
  let searchTerm     = '';
  let searchDebounce = null;
  let pageTextCache  = {};

  // ── File input ──
  document.getElementById('file-input').addEventListener('change', async (e) => {
    const selected = Array.from(e.target.files);
    e.target.value = '';
    for (const f of selected) {
      if (f.type !== 'application/pdf' && !f.name.endsWith('.pdf')) { toast('⚠ Apenas PDFs'); continue; }
      const buf = await f.arrayBuffer();
      const url = URL.createObjectURL(new Blob([buf], {type:'application/pdf'}));
      if (files.find(x => x.name === f.name && x.size === f.size)) { toast('Já adicionado'); continue; }
      files.push({ name: f.name, size: f.size, buf, url });
      toast('✓ ' + f.name);
    }
    renderLibrary();
  });

  // ── Library ──
  function renderLibrary() {
    const list = document.getElementById('file-list');
    const empty = document.getElementById('empty-state');
    list.innerHTML = '';
    if (!files.length) { empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    files.forEach((f, i) => {
      const card = document.createElement('div');
      card.className = 'file-card';
      card.innerHTML = `
        <div class="file-icon">📄</div>
        <div class="file-info">
          <div class="file-name">${escHtml(f.name)}</div>
          <div class="file-meta">${formatSize(f.size)}</div>
        </div>
        <div class="file-actions" onclick="event.stopPropagation()">
          <button class="icon-btn" title="Baixar" onclick="downloadFile(${i})">⬇</button>
          <button class="icon-btn del" title="Remover" onclick="removeFile(${i})">✕</button>
        </div>`;
      card.addEventListener('click', () => openReader(i));
      list.appendChild(card);
    });
  }

  function removeFile(i) {
    URL.revokeObjectURL(files[i].url);
    files.splice(i, 1);
    renderLibrary();
    toast('Arquivo removido');
  }

  // ── Reader ──
  async function openReader(i) {
    currentFile = files[i]; currentPage = 1; zoom = 1.0;
    pageTextCache = {}; clearSearch(); copyModeOn = false;
    document.getElementById('reader-title').textContent = currentFile.name;
    document.getElementById('reader-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    await loadPDF();
  }

  function closeReader() {
    document.getElementById('reader-overlay').classList.remove('open');
    document.body.style.overflow = '';
    if (pdfDoc) { pdfDoc.destroy(); pdfDoc = null; }
    setCopyMode(false);
    clearSearch();
    document.getElementById('search-bar').classList.remove('open');
    document.getElementById('search-toggle-btn').classList.remove('active');
  }

  async function loadPDF() {
    showSpinner(true); setProgress(0);
    try {
      const task = pdfjsLib.getDocument({ data: currentFile.buf.slice(0) });
      task.onProgress = ({ loaded, total }) => { if (total) setProgress(Math.round(loaded/total*100)); };
      pdfDoc = await task.promise;
      setProgress(100);
      await autoFitZoom();
      updatePageInfo();
      await renderPage();
    } catch(e) {
      toast('Erro ao abrir: ' + e.message); closeReader();
    } finally { showSpinner(false); }
  }

  async function autoFitZoom() {
    const container = document.getElementById('canvas-container');
    const availW    = container.clientWidth - 24;
    const page      = await pdfDoc.getPage(1);
    const baseVp    = page.getViewport({ scale: 1 });
    zoom = Math.max(0.3, availW / baseVp.width);
  }

  async function renderPage() {
    if (!pdfDoc) return;
    if (renderTask) { renderTask.cancel(); renderTask = null; }
    const canvas  = document.getElementById('pdf-canvas');
    const ctx     = canvas.getContext('2d');
    const page    = await pdfDoc.getPage(currentPage);
    const dpr     = Math.min(window.devicePixelRatio || 1, 3);
    const vp      = page.getViewport({ scale: zoom });
    const vpHD    = page.getViewport({ scale: zoom * dpr });
    canvas.width  = vpHD.width;  canvas.height  = vpHD.height;
    canvas.style.width = vp.width + 'px'; canvas.style.height = vp.height + 'px';
    const wrapper = document.getElementById('canvas-wrapper');
    wrapper.style.width = vp.width + 'px'; wrapper.style.height = vp.height + 'px';
    renderTask = page.render({ canvasContext: ctx, viewport: vpHD });
    try { await renderTask.promise; } catch(e) { /* cancelled */ }
    updatePageInfo();
    document.getElementById('canvas-container').scrollTop = 0;
    if (searchTerm) await buildHighlights(page, vp);
    else clearTextLayer();
    if (copyModeOn) await buildSelectLayer(page, vp);
    else clearSelectLayer();
  }

  function changePage(delta) {
    if (!pdfDoc) return;
    const n = currentPage + delta;
    if (n < 1 || n > pdfDoc.numPages) return;
    currentPage = n; renderPage();
  }

  function changeZoom(delta) {
    zoom = Math.max(0.3, Math.min(4, zoom + delta));
    document.getElementById('zoom-label').textContent = Math.round(zoom * 100) + '%';
    renderPage();
  }

  function updatePageInfo() {
    if (!pdfDoc) return;
    document.getElementById('page-info').textContent = `Página ${currentPage} / ${pdfDoc.numPages}`;
    document.getElementById('prev-btn').disabled = currentPage <= 1;
    document.getElementById('next-btn').disabled = currentPage >= pdfDoc.numPages;
    document.getElementById('zoom-label').textContent = Math.round(zoom * 100) + '%';
  }

  // ══════════════════════════════════════════════
  // ── MODO CÓPIA (selecionar texto no PDF) ──
  // ══════════════════════════════════════════════
  function toggleCopyMode() {
    setCopyMode(!copyModeOn);
  }

  function setCopyMode(on) {
    copyModeOn = on;
    const btn  = document.getElementById('copy-toggle-btn');
    const hint = document.getElementById('mode-hint');
    btn.classList.toggle('copy-mode', on);
    hint.classList.toggle('show', on);
    if (on) {
      // rebuild select layer for current page
      if (pdfDoc) pdfDoc.getPage(currentPage).then(page => {
        const vp = page.getViewport({ scale: zoom });
        buildSelectLayer(page, vp);
      });
      toast('📋 Selecione o texto com o dedo');
    } else {
      clearSelectLayer();
      dismissCopyPopup();
    }
  }

  // Build transparent selectable text spans over the canvas
  async function buildSelectLayer(page, vp) {
    const layer = document.getElementById('select-layer');
    layer.innerHTML = '';
    layer.style.width  = vp.width  + 'px';
    layer.style.height = vp.height + 'px';
    layer.classList.add('active');

    const tc = await page.getTextContent();
    tc.items.forEach(item => {
      if (!item.str.trim()) return;
      const tx = pdfjsLib.Util.transform(vp.transform, item.transform);
      const x  = tx[4];
      const y  = tx[5];
      const h  = Math.abs(tx[3]) || 12;
      const w  = item.width * zoom;
      // angle
      const angle = Math.atan2(tx[1], tx[0]) * 180 / Math.PI;

      const span = document.createElement('span');
      span.textContent = item.str;
      span.style.cssText = `
        left: ${x}px; top: ${(y - h)}px;
        font-size: ${h * 0.95}px;
        width: ${w}px; height: ${h}px;
        transform: rotate(${angle}deg);
      `;
      layer.appendChild(span);
    });

    // Listen for text selection events
    layer.onmouseup  = handleSelectionEnd;
    layer.ontouchend = handleSelectionEnd;
  }

  function handleSelectionEnd() {
    setTimeout(() => {
      const sel = window.getSelection();
      if (!sel || sel.isCollapsed) return;
      const text = sel.toString().trim();
      if (!text) return;
      pendingCopy = text;
      showCopyPopup(text);
    }, 80);
  }

  function showCopyPopup(text) {
    const popup  = document.getElementById('copy-popup');
    const label  = document.getElementById('copy-popup-text');
    label.textContent = text.length > 80 ? text.slice(0, 77) + '…' : text;
    // Position near center-bottom of screen
    popup.style.left   = '50%';
    popup.style.top    = '50%';
    popup.style.transform = 'translate(-50%, -50%)';
    popup.classList.add('show');
  }

  async function confirmCopy() {
    if (!pendingCopy) return;
    try {
      await navigator.clipboard.writeText(pendingCopy);
      toast('✓ Texto copiado!');
    } catch {
      // fallback for mobile without clipboard API permission
      const ta = document.createElement('textarea');
      ta.value = pendingCopy; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select(); document.execCommand('copy');
      document.body.removeChild(ta);
      toast('✓ Texto copiado!');
    }
    dismissCopyPopup();
    window.getSelection()?.removeAllRanges();
  }

  function dismissCopyPopup() {
    document.getElementById('copy-popup').classList.remove('show');
    pendingCopy = '';
    window.getSelection()?.removeAllRanges();
  }

  function clearSelectLayer() {
    const layer = document.getElementById('select-layer');
    layer.innerHTML = ''; layer.classList.remove('active');
    layer.onmouseup = null; layer.ontouchend = null;
  }

  // ══════════════════════════════════════════════
  // ── MODO EDIÇÃO (texto extraído + editável) ──
  // ══════════════════════════════════════════════
  async function openEditOverlay() {
    if (!pdfDoc) { toast('Abra um PDF primeiro'); return; }
    const overlay = document.getElementById('edit-overlay');
    const ta      = document.getElementById('edit-textarea');
    const info    = document.getElementById('edit-info');
    const label   = document.getElementById('edit-page-label');
    overlay.classList.add('open');
    ta.value = 'Extraindo texto…';
    label.textContent = currentPage;

    // Extract text from current page
    const page = await pdfDoc.getPage(currentPage);
    const tc   = await page.getTextContent();
    let text = '';
    let lastY = null;
    tc.items.forEach(item => {
      if (!item.str) return;
      const y = Math.round(item.transform[5]);
      if (lastY !== null && Math.abs(y - lastY) > 4) text += '\n';
      text += item.str;
      lastY = y;
    });
    ta.value = text.trim();
    const chars = ta.value.length;
    const words = ta.value.split(/\s+/).filter(Boolean).length;
    info.textContent = `${chars} caracteres · ${words} palavras · pág. ${currentPage}`;

    // Update info on edit
    ta.oninput = () => {
      const c = ta.value.length;
      const w = ta.value.split(/\s+/).filter(Boolean).length;
      info.textContent = `${c} caracteres · ${w} palavras · pág. ${currentPage}`;
    };
  }

  function closeEditOverlay() {
    document.getElementById('edit-overlay').classList.remove('open');
  }

  async function editCopyAll() {
    const text = document.getElementById('edit-textarea').value;
    if (!text) return;
    try {
      await navigator.clipboard.writeText(text);
      toast('✓ Todo o texto copiado!');
    } catch {
      const ta2 = document.createElement('textarea');
      ta2.value = text; ta2.style.position = 'fixed'; ta2.style.opacity = '0';
      document.body.appendChild(ta2); ta2.select(); document.execCommand('copy');
      document.body.removeChild(ta2);
      toast('✓ Todo o texto copiado!');
    }
  }

  function editSave() {
    const text = document.getElementById('edit-textarea').value;
    if (!text) return;
    const name  = (currentFile?.name || 'documento').replace(/\.pdf$/i, '') + `_pag${currentPage}.txt`;
    const blob  = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url   = URL.createObjectURL(blob);
    const a     = document.createElement('a');
    a.href = url; a.download = name;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('💾 Salvo como ' + name);
  }

  // ══════════════════════════════════════════════
  // ── PESQUISA ──
  // ══════════════════════════════════════════════
  function toggleSearch() {
    const bar = document.getElementById('search-bar');
    const btn = document.getElementById('search-toggle-btn');
    const open = bar.classList.toggle('open');
    btn.classList.toggle('active', open);
    if (open) { setTimeout(() => document.getElementById('search-input').focus(), 80); }
    else { clearSearch(); renderPage(); }
  }

  function onSearchInput() {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(runSearch, 300);
  }

  function onSearchKey(e) {
    if (e.key === 'Enter')  navigateMatch(e.shiftKey ? -1 : 1);
    if (e.key === 'Escape') toggleSearch();
  }

  async function runSearch() {
    const term = document.getElementById('search-input').value.trim().toLowerCase();
    searchTerm = term; searchMatches = []; searchMatchIdx = -1;
    if (!pdfDoc || term.length < 2) {
      document.getElementById('search-count').textContent = '—';
      document.getElementById('srch-prev').disabled = true;
      document.getElementById('srch-next').disabled = true;
      clearTextLayer(); return;
    }
    for (let p = 1; p <= pdfDoc.numPages; p++) {
      const items = await getPageText(p);
      const pm = [];
      for (const item of items) {
        const t = item.str.toLowerCase(); let idx = 0;
        while ((idx = t.indexOf(term, idx)) !== -1) { pm.push({ item, charStart:idx, charEnd:idx+term.length }); idx++; }
      }
      if (pm.length) searchMatches.push({ page:p, matches:pm });
    }
    const total = searchMatches.reduce((s,m) => s + m.matches.length, 0);
    document.getElementById('search-count').textContent = total ? `1/${total}` : '0';
    document.getElementById('srch-prev').disabled = total === 0;
    document.getElementById('srch-next').disabled = total === 0;
    if (total) { searchMatchIdx = 0; await jumpToMatch(0); }
    else { toast('Nenhum resultado'); clearTextLayer(); }
  }

  async function navigateMatch(dir) {
    if (!searchMatches.length) return;
    const total = searchMatches.reduce((s,m) => s + m.matches.length, 0);
    searchMatchIdx = (searchMatchIdx + dir + total) % total;
    document.getElementById('search-count').textContent = `${searchMatchIdx+1}/${total}`;
    await jumpToMatch(searchMatchIdx);
  }

  async function jumpToMatch(globalIdx) {
    let count = 0;
    for (const pg of searchMatches) {
      for (let m = 0; m < pg.matches.length; m++) {
        if (count === globalIdx) {
          if (currentPage !== pg.page) { currentPage = pg.page; await renderPage(); }
          else {
            const page = await pdfDoc.getPage(currentPage);
            const vp   = page.getViewport({ scale: zoom });
            await buildHighlights(page, vp, count);
          }
          return;
        }
        count++;
      }
    }
  }

  async function buildHighlights(page, vp, activeGlobal) {
    clearTextLayer();
    if (!searchTerm || !searchMatches.length) return;
    const layer = document.getElementById('text-layer');
    layer.style.width = vp.width + 'px'; layer.style.height = vp.height + 'px';
    const pgData = searchMatches.find(x => x.page === currentPage);
    if (!pgData) return;
    let globalOffset = 0;
    for (const pg of searchMatches) { if (pg.page === currentPage) break; globalOffset += pg.matches.length; }
    pgData.matches.forEach((m, li) => {
      const gi   = globalOffset + li;
      const item = m.item;
      const tx   = pdfjsLib.Util.transform(vp.transform, item.transform);
      const x=tx[4], y=tx[5], h=Math.abs(tx[3])||10;
      const charW  = item.width * zoom / (item.str.length || 1);
      const startX = x + m.charStart * charW;
      const matchW = (m.charEnd - m.charStart) * charW;
      const el = document.createElement('div');
      el.className = 'highlight' + (gi === activeGlobal ? ' active' : '');
      el.style.cssText = `left:${startX}px;top:${y-h}px;width:${matchW}px;height:${h}px;`;
      layer.appendChild(el);
      if (gi === activeGlobal) {
        setTimeout(() => {
          const cont = document.getElementById('canvas-container');
          const r = el.getBoundingClientRect(), cr = cont.getBoundingClientRect();
          if (r.top < cr.top || r.bottom > cr.bottom) el.scrollIntoView({ block:'center', behavior:'smooth' });
        }, 100);
      }
    });
  }

  async function getPageText(pageNum) {
    if (pageTextCache[pageNum]) return pageTextCache[pageNum];
    const page = await pdfDoc.getPage(pageNum);
    const tc   = await page.getTextContent();
    pageTextCache[pageNum] = tc.items.filter(i => i.str);
    return pageTextCache[pageNum];
  }

  function clearTextLayer() { document.getElementById('text-layer').innerHTML = ''; }

  function clearSearch() {
    searchMatches = []; searchMatchIdx = -1; searchTerm = '';
    document.getElementById('search-input').value = '';
    document.getElementById('search-count').textContent = '—';
    document.getElementById('srch-prev').disabled = true;
    document.getElementById('srch-next').disabled = true;
    clearTextLayer();
  }

  // ── Download ──
  function downloadFile(i)  { triggerDownload(files[i].url, files[i].name); toast('⬇ Baixando ' + files[i].name); }
  function downloadCurrent() { if (!currentFile) return; triggerDownload(currentFile.url, currentFile.name); toast('⬇ Baixando ' + currentFile.name); }
  function triggerDownload(url, name) { const a=document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a); a.click(); document.body.removeChild(a); }

  // ── Swipe ──
  let touchX=0, touchY=0;
  document.getElementById('canvas-container').addEventListener('touchstart', e => { touchX=e.touches[0].clientX; touchY=e.touches[0].clientY; }, { passive:true });
  document.getElementById('canvas-container').addEventListener('touchend', e => {
    if (copyModeOn) return;
    const dx=e.changedTouches[0].clientX-touchX, dy=e.changedTouches[0].clientY-touchY;
    if (Math.abs(dx) > 70 && Math.abs(dx) > Math.abs(dy)) changePage(dx<0?1:-1);
  }, { passive:true });

  // ── Keyboard ──
  document.addEventListener('keydown', e => {
    if (!pdfDoc) return;
    if (document.activeElement === document.getElementById('search-input')) return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changePage(1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   changePage(-1);
    if (e.key === 'Escape') { closeEditOverlay(); closeReader(); }
    if ((e.ctrlKey||e.metaKey) && e.key==='f') { e.preventDefault(); toggleSearch(); }
  });

  // Click outside copy popup to dismiss
  document.addEventListener('click', e => {
    const popup = document.getElementById('copy-popup');
    if (popup.classList.contains('show') && !popup.contains(e.target)) dismissCopyPopup();
  });

  // ── Helpers ──
  function showSpinner(v) {
    document.getElementById('loading-spinner').classList.toggle('show', v);
    document.getElementById('canvas-wrapper').style.display = v ? 'none' : 'inline-block';
  }
  function setProgress(pct) { document.getElementById('progress-bar').style.width = pct + '%'; }
  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
  }
  function formatSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
    return (b/1048576).toFixed(1) + ' MB';
  }
  function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // ── PWA ──
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

  renderLibrary();
</script>
