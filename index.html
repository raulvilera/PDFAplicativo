<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f0e17" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PDF Reader" />
  <meta name="description" content="Leitor e gerenciador de PDFs" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>PDF·Leitor</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');

    :root {
      --bg:      #0f0e17;
      --surface: #1a1928;
      --card:    #22213a;
      --accent:  #ff6b35;
      --accent2: #e84855;
      --text:    #fffffe;
      --muted:   #a7a9be;
      --border:  #2e2d4a;
      --success: #2cb67d;
      --highlight: rgba(255,200,0,0.45);
      --highlight-active: rgba(255,107,53,0.7);
      --radius:  14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(15,14,23,.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 1.15rem; font-weight: 700; letter-spacing: -.5px;
      color: var(--text); flex: 1;
    }
    .logo span { color: var(--accent); }
    #btn-open {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; color: #fff;
      font-family: 'DM Sans', sans-serif; font-size: .85rem; font-weight: 600;
      padding: 9px 18px; border-radius: 50px; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: opacity .2s, transform .15s; white-space: nowrap;
    }
    #btn-open:active { transform: scale(.95); opacity: .9; }

    /* ── Library ── */
    #library { padding: 20px 16px; }
    .section-label {
      font-family: 'Space Mono', monospace; font-size: .7rem;
      text-transform: uppercase; letter-spacing: 2px;
      color: var(--muted); margin-bottom: 14px;
    }
    #file-list { display: flex; flex-direction: column; gap: 10px; }
    .file-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
      display: flex; align-items: center; gap: 14px; cursor: pointer;
      transition: background .2s, border-color .2s, transform .15s;
      animation: fadeUp .3s ease both;
    }
    .file-card:active { transform: scale(.98); }
    .file-card:hover  { border-color: var(--accent); background: #2a2840; }
    .file-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #2a1a10, #3d1f0f);
      border-radius: 10px; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; font-size: 1.3rem;
    }
    .file-info { flex: 1; overflow: hidden; }
    .file-name {
      font-size: .92rem; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .file-meta { font-size: .75rem; color: var(--muted); margin-top: 2px; }
    .file-actions { display: flex; gap: 6px; }
    .icon-btn {
      width: 34px; height: 34px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem; transition: all .2s;
    }
    .icon-btn:hover, .icon-btn:active { color: var(--accent); border-color: var(--accent); }
    .icon-btn.del:hover, .icon-btn.del:active { color: var(--accent2); border-color: var(--accent2); }

    /* ── Empty state ── */
    #empty-state { text-align: center; padding: 60px 20px; }
    .empty-icon { font-size: 4rem; margin-bottom: 16px; filter: grayscale(.5); }
    .empty-title { font-size: 1.1rem; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .empty-sub { font-size: .85rem; color: var(--muted); line-height: 1.5; }

    /* ── Reader overlay ── */
    #reader-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: var(--bg); flex-direction: column;
    }
    #reader-overlay.open { display: flex; }

    #reader-header {
      background: rgba(15,14,23,.92);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 10px 12px;
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    #back-btn {
      background: var(--card); border: 1px solid var(--border); color: var(--text);
      width: 36px; height: 36px; border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
      transition: all .2s; flex-shrink: 0;
    }
    #back-btn:active { transform: scale(.9); }
    #reader-title {
      flex: 1; font-size: .82rem; font-weight: 600;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    }
    #search-toggle-btn {
      background: var(--card); border: 1px solid var(--border); color: var(--muted);
      width: 36px; height: 36px; border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 1rem;
      transition: all .2s; flex-shrink: 0;
    }
    #search-toggle-btn.active { color: var(--accent); border-color: var(--accent); }
    #download-btn {
      background: var(--success); border: none; color: #fff;
      font-family: 'DM Sans', sans-serif; font-size: .8rem; font-weight: 600;
      padding: 8px 12px; border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      transition: opacity .2s, transform .15s; flex-shrink: 0;
    }
    #download-btn:active { transform: scale(.95); opacity: .85; }

    /* ── Search bar ── */
    #search-bar {
      display: none;
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 8px 12px; gap: 8px; align-items: center; flex-shrink: 0;
    }
    #search-bar.open { display: flex; }
    #search-input {
      flex: 1; background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 7px 12px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: .88rem; outline: none;
      transition: border-color .2s;
    }
    #search-input:focus { border-color: var(--accent); }
    #search-input::placeholder { color: var(--muted); }
    #search-count {
      font-family: 'Space Mono', monospace; font-size: .7rem;
      color: var(--muted); white-space: nowrap; min-width: 52px; text-align: center;
    }
    .srch-nav {
      background: var(--card); border: 1px solid var(--border); color: var(--muted);
      width: 30px; height: 30px; border-radius: 7px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: .9rem;
      transition: all .2s; flex-shrink: 0;
    }
    .srch-nav:disabled { opacity: .3; cursor: default; }
    .srch-nav:not(:disabled):active { color: var(--accent); border-color: var(--accent); }

    /* ── Page bar ── */
    #page-bar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 7px 12px; display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .nav-btn {
      background: var(--card); border: 1px solid var(--border); color: var(--text);
      width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-size: .9rem;
      display: flex; align-items: center; justify-content: center; transition: all .2s;
    }
    .nav-btn:disabled { opacity: .3; cursor: default; }
    .nav-btn:not(:disabled):active { transform: scale(.9); border-color: var(--accent); }
    #page-info {
      font-family: 'Space Mono', monospace; font-size: .72rem;
      color: var(--muted); flex: 1; text-align: center;
    }
    .zoom-btn {
      background: var(--card); border: 1px solid var(--border); color: var(--text);
      width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center; transition: all .2s;
    }
    .zoom-btn:active { transform: scale(.9); }
    #zoom-label {
      font-family: 'Space Mono', monospace; font-size: .68rem;
      color: var(--muted); min-width: 36px; text-align: center;
    }

    /* ── Canvas area ── */
    #canvas-container {
      flex: 1; overflow: auto; -webkit-overflow-scrolling: touch;
      display: flex; justify-content: center; align-items: flex-start;
      padding: 12px; background: #08070f; position: relative;
    }
    #canvas-wrapper { position: relative; display: inline-block; }
    #pdf-canvas {
      display: block; border-radius: 4px;
      box-shadow: 0 4px 40px rgba(0,0,0,.7);
    }

    /* ── Text layer (highlights) ── */
    #text-layer {
      position: absolute; top: 0; left: 0;
      pointer-events: none; overflow: hidden;
    }
    #text-layer .highlight {
      position: absolute; background: var(--highlight);
      border-radius: 2px; pointer-events: none;
    }
    #text-layer .highlight.active {
      background: var(--highlight-active);
      outline: 2px solid var(--accent);
    }

    /* ── Spinner ── */
    #loading-spinner {
      display: none; flex-direction: column;
      align-items: center; gap: 12px; padding: 40px;
      color: var(--muted); font-size: .85rem;
    }
    #loading-spinner.show { display: flex; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .8s linear infinite;
    }

    /* ── Progress bar ── */
    #progress-bar {
      height: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%; transition: width .3s; flex-shrink: 0;
    }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--card); border: 1px solid var(--border); color: var(--text);
      padding: 10px 20px; border-radius: 50px; font-size: .82rem;
      opacity: 0; transition: all .3s ease; z-index: 999;
      white-space: nowrap; pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<input type="file" id="file-input" accept=".pdf,application/pdf" style="display:none" multiple />

<!-- ── Main screen ── -->
<header>
  <div class="logo">PDF<span>·</span>Leitor</div>
  <button id="btn-open" onclick="document.getElementById('file-input').click()">
    <span>＋</span> Abrir PDF
  </button>
</header>

<div id="library">
  <div class="section-label">Biblioteca</div>
  <div id="file-list"></div>
  <div id="empty-state">
    <div class="empty-icon">📂</div>
    <div class="empty-title">Nenhum PDF aberto</div>
    <div class="empty-sub">Toque em <strong>+ Abrir PDF</strong> para carregar<br>arquivos do seu dispositivo.</div>
  </div>
</div>

<!-- ── Reader overlay ── -->
<div id="reader-overlay">
  <div id="reader-header">
    <button id="back-btn" onclick="closeReader()">←</button>
    <div id="reader-title">—</div>
    <button id="search-toggle-btn" title="Pesquisar" onclick="toggleSearch()">🔍</button>
    <button id="download-btn" onclick="downloadCurrent()">⬇ Baixar</button>
  </div>
  <div id="progress-bar"></div>

  <!-- Search bar (hidden by default) -->
  <div id="search-bar">
    <input id="search-input" type="search" placeholder="Pesquisar no PDF…"
           oninput="onSearchInput()" onkeydown="onSearchKey(event)" />
    <span id="search-count">—</span>
    <button class="srch-nav" id="srch-prev" title="Anterior" onclick="navigateMatch(-1)">↑</button>
    <button class="srch-nav" id="srch-next" title="Próximo"  onclick="navigateMatch(1)">↓</button>
  </div>

  <div id="page-bar">
    <button class="nav-btn" id="prev-btn" onclick="changePage(-1)">‹</button>
    <div id="page-info">— / —</div>
    <button class="nav-btn" id="next-btn" onclick="changePage(1)">›</button>
    <button class="zoom-btn" onclick="changeZoom(-0.15)">−</button>
    <div id="zoom-label">100%</div>
    <button class="zoom-btn" onclick="changeZoom(0.15)">+</button>
  </div>

  <div id="canvas-container">
    <div id="loading-spinner" class="show">
      <div class="spinner"></div>
      <span>Carregando PDF…</span>
    </div>
    <div id="canvas-wrapper">
      <canvas id="pdf-canvas"></canvas>
      <div id="text-layer"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  // ── State ──
  let files        = [];
  let currentFile  = null;
  let pdfDoc       = null;
  let currentPage  = 1;
  let zoom         = 1.0;   // will be recalculated to fit width
  let renderTask   = null;

  // Search state
  let searchMatches    = [];  // [{page, items:[{rect,str}]}]
  let searchMatchIdx   = -1;  // current match index (global across pages)
  let searchTerm       = '';
  let searchDebounce   = null;
  let pageTextCache    = {};  // page -> [{str, rect, transform}]

  // ── File input ──
  document.getElementById('file-input').addEventListener('change', async (e) => {
    const selected = Array.from(e.target.files);
    e.target.value = '';
    for (const f of selected) {
      if (f.type !== 'application/pdf' && !f.name.endsWith('.pdf')) {
        toast('⚠ Apenas arquivos PDF são aceitos'); continue;
      }
      const buf = await f.arrayBuffer();
      const url = URL.createObjectURL(new Blob([buf], {type:'application/pdf'}));
      if (files.find(x => x.name === f.name && x.size === f.size)) {
        toast('Arquivo já adicionado'); continue;
      }
      files.push({ name: f.name, size: f.size, buf, url });
      toast(`✓ ${f.name}`);
    }
    renderLibrary();
  });

  // ── Library ──
  function renderLibrary() {
    const list  = document.getElementById('file-list');
    const empty = document.getElementById('empty-state');
    list.innerHTML = '';
    if (!files.length) { empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    files.forEach((f, i) => {
      const card = document.createElement('div');
      card.className = 'file-card';
      card.innerHTML = `
        <div class="file-icon">📄</div>
        <div class="file-info">
          <div class="file-name">${escHtml(f.name)}</div>
          <div class="file-meta">${formatSize(f.size)}</div>
        </div>
        <div class="file-actions" onclick="event.stopPropagation()">
          <button class="icon-btn" title="Baixar" onclick="downloadFile(${i})">⬇</button>
          <button class="icon-btn del" title="Remover" onclick="removeFile(${i})">✕</button>
        </div>`;
      card.addEventListener('click', () => openReader(i));
      list.appendChild(card);
    });
  }

  function removeFile(i) {
    URL.revokeObjectURL(files[i].url);
    files.splice(i, 1);
    renderLibrary();
    toast('Arquivo removido');
  }

  // ── Reader ──
  async function openReader(i) {
    currentFile = files[i];
    currentPage = 1;
    zoom        = 1.0;
    pageTextCache = {};
    clearSearch();
    document.getElementById('reader-title').textContent = currentFile.name;
    document.getElementById('reader-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    await loadPDF();
  }

  function closeReader() {
    document.getElementById('reader-overlay').classList.remove('open');
    document.body.style.overflow = '';
    if (pdfDoc) { pdfDoc.destroy(); pdfDoc = null; }
    clearSearch();
    document.getElementById('search-bar').classList.remove('open');
    document.getElementById('search-toggle-btn').classList.remove('active');
  }

  async function loadPDF() {
    showSpinner(true);
    setProgress(0);
    try {
      const loadingTask = pdfjsLib.getDocument({ data: currentFile.buf.slice(0) });
      loadingTask.onProgress = ({ loaded, total }) => {
        if (total) setProgress(Math.round(loaded / total * 100));
      };
      pdfDoc = await loadingTask.promise;
      setProgress(100);
      // Auto-fit zoom to container width
      await autoFitZoom();
      updatePageInfo();
      await renderPage();
    } catch(e) {
      toast('Erro ao abrir PDF: ' + e.message);
      closeReader();
    } finally {
      showSpinner(false);
    }
  }

  // ── FIX: calculate zoom so page fits the container width exactly ──
  async function autoFitZoom() {
    const container = document.getElementById('canvas-container');
    const availW    = container.clientWidth - 24; // 12px padding each side
    const page      = await pdfDoc.getPage(1);
    const baseVp    = page.getViewport({ scale: 1 });
    zoom = Math.max(0.3, availW / baseVp.width);
  }

  async function renderPage() {
    if (!pdfDoc) return;
    if (renderTask) { renderTask.cancel(); renderTask = null; }

    const canvas  = document.getElementById('pdf-canvas');
    const ctx     = canvas.getContext('2d');
    const page    = await pdfDoc.getPage(currentPage);

    // ── FIX: use DPR only for internal canvas resolution, set CSS size to logical pixels ──
    const dpr  = Math.min(window.devicePixelRatio || 1, 3); // cap at 3x
    const vp   = page.getViewport({ scale: zoom });         // logical viewport
    const vpHD = page.getViewport({ scale: zoom * dpr });   // hi-res for canvas

    canvas.width  = vpHD.width;
    canvas.height = vpHD.height;
    canvas.style.width  = vp.width  + 'px';
    canvas.style.height = vp.height + 'px';

    // Size text-layer wrapper to logical size
    const wrapper = document.getElementById('canvas-wrapper');
    wrapper.style.width  = vp.width  + 'px';
    wrapper.style.height = vp.height + 'px';

    renderTask = page.render({ canvasContext: ctx, viewport: vpHD });
    try {
      await renderTask.promise;
    } catch(e) { /* cancelled */ }

    updatePageInfo();
    document.getElementById('canvas-container').scrollTop = 0;

    // Rebuild text highlights if search is active
    if (searchTerm) await buildHighlights(page, vp);
    else clearTextLayer();
  }

  function changePage(delta) {
    if (!pdfDoc) return;
    const next = currentPage + delta;
    if (next < 1 || next > pdfDoc.numPages) return;
    currentPage = next;
    renderPage();
  }

  function changeZoom(delta) {
    zoom = Math.max(0.3, Math.min(4, zoom + delta));
    document.getElementById('zoom-label').textContent = Math.round(zoom * 100) + '%';
    renderPage();
  }

  function updatePageInfo() {
    if (!pdfDoc) return;
    document.getElementById('page-info').textContent = `Página ${currentPage} / ${pdfDoc.numPages}`;
    document.getElementById('prev-btn').disabled = currentPage <= 1;
    document.getElementById('next-btn').disabled = currentPage >= pdfDoc.numPages;
    document.getElementById('zoom-label').textContent = Math.round(zoom * 100) + '%';
  }

  // ── Search ──
  function toggleSearch() {
    const bar = document.getElementById('search-bar');
    const btn = document.getElementById('search-toggle-btn');
    const open = bar.classList.toggle('open');
    btn.classList.toggle('active', open);
    if (open) {
      setTimeout(() => document.getElementById('search-input').focus(), 80);
    } else {
      clearSearch();
      renderPage();
    }
  }

  function onSearchInput() {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(runSearch, 300);
  }

  function onSearchKey(e) {
    if (e.key === 'Enter') navigateMatch(e.shiftKey ? -1 : 1);
    if (e.key === 'Escape') toggleSearch();
  }

  async function runSearch() {
    const term = document.getElementById('search-input').value.trim().toLowerCase();
    searchTerm = term;
    searchMatches = [];
    searchMatchIdx = -1;

    if (!pdfDoc || term.length < 2) {
      document.getElementById('search-count').textContent = '—';
      document.getElementById('srch-prev').disabled = true;
      document.getElementById('srch-next').disabled = true;
      clearTextLayer();
      return;
    }

    // Search all pages
    for (let p = 1; p <= pdfDoc.numPages; p++) {
      const items = await getPageText(p);
      const pageMatches = [];
      for (const item of items) {
        const text = item.str.toLowerCase();
        let idx = 0;
        while ((idx = text.indexOf(term, idx)) !== -1) {
          pageMatches.push({ item, charStart: idx, charEnd: idx + term.length });
          idx++;
        }
      }
      if (pageMatches.length) searchMatches.push({ page: p, matches: pageMatches });
    }

    const total = searchMatches.reduce((s, m) => s + m.matches.length, 0);
    document.getElementById('search-count').textContent = total ? `1/${total}` : '0';
    document.getElementById('srch-prev').disabled = total === 0;
    document.getElementById('srch-next').disabled = total === 0;

    if (total) {
      searchMatchIdx = 0;
      await jumpToMatch(0);
    } else {
      toast('Nenhum resultado encontrado');
      clearTextLayer();
    }
  }

  async function navigateMatch(dir) {
    if (!searchMatches.length) return;
    const total = searchMatches.reduce((s, m) => s + m.matches.length, 0);
    searchMatchIdx = (searchMatchIdx + dir + total) % total;
    const num = searchMatchIdx + 1;
    document.getElementById('search-count').textContent = `${num}/${total}`;
    await jumpToMatch(searchMatchIdx);
  }

  async function jumpToMatch(globalIdx) {
    // Find which page/match this global index maps to
    let count = 0;
    for (const pg of searchMatches) {
      for (let m = 0; m < pg.matches.length; m++) {
        if (count === globalIdx) {
          if (currentPage !== pg.page) {
            currentPage = pg.page;
            await renderPageForSearch();
          } else {
            const page = await pdfDoc.getPage(currentPage);
            const vp = page.getViewport({ scale: zoom });
            await buildHighlights(page, vp, count);
          }
          return;
        }
        count++;
      }
    }
  }

  async function renderPageForSearch() {
    if (!pdfDoc) return;
    if (renderTask) { renderTask.cancel(); renderTask = null; }
    const canvas  = document.getElementById('pdf-canvas');
    const ctx     = canvas.getContext('2d');
    const page    = await pdfDoc.getPage(currentPage);
    const dpr     = Math.min(window.devicePixelRatio || 1, 3);
    const vp      = page.getViewport({ scale: zoom });
    const vpHD    = page.getViewport({ scale: zoom * dpr });
    canvas.width  = vpHD.width;
    canvas.height = vpHD.height;
    canvas.style.width  = vp.width  + 'px';
    canvas.style.height = vp.height + 'px';
    const wrapper = document.getElementById('canvas-wrapper');
    wrapper.style.width  = vp.width  + 'px';
    wrapper.style.height = vp.height + 'px';
    renderTask = page.render({ canvasContext: ctx, viewport: vpHD });
    try { await renderTask.promise; } catch(e) {}
    updatePageInfo();
    document.getElementById('canvas-container').scrollTop = 0;
    await buildHighlights(page, vp, searchMatchIdx);
  }

  async function buildHighlights(page, vp, activeGlobal) {
    clearTextLayer();
    if (!searchTerm || !searchMatches.length) return;

    const layer = document.getElementById('text-layer');
    layer.style.width  = vp.width  + 'px';
    layer.style.height = vp.height + 'px';

    // Find matches on current page
    const pgData = searchMatches.find(x => x.page === currentPage);
    if (!pgData) return;

    // Count global offset up to this page
    let globalOffset = 0;
    for (const pg of searchMatches) {
      if (pg.page === currentPage) break;
      globalOffset += pg.matches.length;
    }

    pgData.matches.forEach((m, localIdx) => {
      const globalIdx = globalOffset + localIdx;
      const item = m.item;
      // Convert PDF coords to canvas coords
      const tx = pdfjsLib.Util.transform(vp.transform, item.transform);
      const x = tx[4];
      const y = tx[5];
      const h = Math.abs(tx[3]) || 10;
      // Approximate width per character
      const charW = item.width * zoom / (item.str.length || 1);
      const startX = x + m.charStart * charW;
      const matchW = (m.charEnd - m.charStart) * charW;

      const el = document.createElement('div');
      el.className = 'highlight' + (globalIdx === activeGlobal ? ' active' : '');
      el.style.left   = startX + 'px';
      el.style.top    = (y - h) + 'px';
      el.style.width  = matchW + 'px';
      el.style.height = h + 'px';
      layer.appendChild(el);

      if (globalIdx === activeGlobal) {
        // Scroll highlight into view
        setTimeout(() => {
          const cont = document.getElementById('canvas-container');
          const rect = el.getBoundingClientRect();
          const contRect = cont.getBoundingClientRect();
          if (rect.top < contRect.top || rect.bottom > contRect.bottom) {
            el.scrollIntoView({ block: 'center', behavior: 'smooth' });
          }
        }, 100);
      }
    });
  }

  async function getPageText(pageNum) {
    if (pageTextCache[pageNum]) return pageTextCache[pageNum];
    const page = await pdfDoc.getPage(pageNum);
    const tc = await page.getTextContent();
    pageTextCache[pageNum] = tc.items.filter(i => i.str);
    return pageTextCache[pageNum];
  }

  function clearTextLayer() {
    document.getElementById('text-layer').innerHTML = '';
  }

  function clearSearch() {
    searchMatches = [];
    searchMatchIdx = -1;
    searchTerm = '';
    document.getElementById('search-input').value = '';
    document.getElementById('search-count').textContent = '—';
    document.getElementById('srch-prev').disabled = true;
    document.getElementById('srch-next').disabled = true;
    clearTextLayer();
  }

  // ── Download ──
  function downloadFile(i) {
    triggerDownload(files[i].url, files[i].name);
    toast('⬇ Baixando ' + files[i].name);
  }
  function downloadCurrent() {
    if (!currentFile) return;
    triggerDownload(currentFile.url, currentFile.name);
    toast('⬇ Baixando ' + currentFile.name);
  }
  function triggerDownload(url, name) {
    const a = document.createElement('a');
    a.href = url; a.download = name;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }

  // ── Swipe gestures ──
  let touchX = 0;
  document.getElementById('canvas-container').addEventListener('touchstart', e => {
    touchX = e.touches[0].clientX;
  }, { passive: true });
  document.getElementById('canvas-container').addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 70) changePage(dx < 0 ? 1 : -1);
  }, { passive: true });

  // ── Keyboard ──
  document.addEventListener('keydown', e => {
    if (!pdfDoc) return;
    if (document.activeElement === document.getElementById('search-input')) return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changePage(1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   changePage(-1);
    if (e.key === 'Escape') closeReader();
    if ((e.ctrlKey || e.metaKey) && e.key === 'f') { e.preventDefault(); toggleSearch(); }
  });

  // ── Helpers ──
  function showSpinner(v) {
    document.getElementById('loading-spinner').classList.toggle('show', v);
    document.getElementById('canvas-wrapper').style.display = v ? 'none' : 'inline-block';
  }
  function setProgress(pct) {
    document.getElementById('progress-bar').style.width = pct + '%';
  }
  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
  }
  function formatSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
    return (b/1048576).toFixed(1) + ' MB';
  }
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── PWA ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  renderLibrary();
</script>
</body>
