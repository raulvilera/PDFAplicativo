<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF·Leitor</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #00d4ff;
            --primary-dark: #0099cc;
            --secondary: #00a8e8;
            --accent: #0077b6;
            --bg-dark: #000000;
            --bg-card: #0a0a0a;
            --bg-elevated: #1a1a1a;
            --bg-surface: #111111;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border: #2a2a2a;
            --success: #00d4ff;
            --warning: #fbbf24;
            --error: #ef4444;
            --gradient-header: linear-gradient(135deg, #000000 0%, #003d66 50%, #00a8e8 100%);
            --gradient-button: linear-gradient(135deg, #0077b6 0%, #00d4ff 100%);
            --gradient-card: linear-gradient(145deg, #0a0a0a 0%, #1a1a1a 100%);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse at top left, rgba(0, 168, 232, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(0, 119, 182, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .app-header {
            background: var(--gradient-header);
            padding: 0.75rem 1.5rem;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6), 0 0 30px rgba(0,168,232,0.15);
            border-bottom: 1px solid rgba(0,212,255,0.2);
            margin: 0 1rem;
            margin-top: 0.5rem;
            border-radius: 16px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        .header-content { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; }

        .logo-3d { display: flex; align-items: center; gap: 1rem; }

        .logo-icon {
            width: 50px; height: 50px;
            background: linear-gradient(135deg, #000000 0%, #003d66 50%, #00a8e8 100%);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4), 0 0 20px rgba(0,212,255,0.2);
            border: 1px solid rgba(0,212,255,0.2);
        }

        .logo-text {
            font-size: 1.5rem; font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .main-container { max-width: 1400px; margin: 0 auto; padding: 1rem; position: relative; z-index: 1; }

        .toolbar {
            background: var(--gradient-card);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            display: flex; flex-wrap: wrap; gap: 0.75rem;
            align-items: center; justify-content: space-between;
        }

        .toolbar-group { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }

        .btn {
            padding: 0.6rem 1.2rem;
            border: none; border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600; font-size: 0.85rem;
            cursor: pointer; transition: all 0.3s ease;
            display: inline-flex; align-items: center; gap: 0.4rem;
        }

        .btn-primary { background: var(--gradient-button); color: #000; font-weight: 700; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,212,255,0.4); }

        .btn-secondary { background: var(--bg-elevated); color: var(--text-primary); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--bg-surface); border-color: var(--primary); color: var(--primary); transform: translateY(-2px); }
        .btn-secondary.active { background: rgba(0,212,255,0.15); border-color: var(--primary); color: var(--primary); box-shadow: 0 0 15px rgba(0,212,255,0.2); }

        .btn-icon { padding: 0.6rem; border-radius: 10px; width: 40px; height: 40px; justify-content: center; }

        .search-container { position: relative; flex: 1; min-width: 250px; max-width: 400px; }

        .search-input {
            width: 100%; padding: 0.6rem 0.8rem 0.6rem 2.5rem;
            border: 2px solid var(--border); border-radius: 10px;
            background: var(--bg-elevated); color: var(--text-primary);
            font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
            transition: all 0.3s ease;
        }
        .search-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,212,255,0.1); }
        .search-input::placeholder { color: var(--text-secondary); }
        .search-icon { position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); color: var(--primary); }

        .viewer-container {
            background: var(--gradient-card);
            border-radius: 12px; padding: 1rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            min-height: 600px; position: relative;
        }

        .empty-state { text-align: center; padding: 3rem 1.5rem; color: var(--text-secondary); }
        .empty-icon { font-size: 4rem; margin-bottom: 1rem; opacity: 0.5; }
        .empty-title { font-size: 1.3rem; margin-bottom: 0.75rem; color: var(--text-primary); }
        .empty-state strong { color: var(--primary); }

        .pdf-wrapper { display: none; flex-direction: column; align-items: center; gap: 1.5rem; }
        .pdf-wrapper.active { display: flex; }

        .page-nav-overlay {
            position: sticky; top: 1rem; z-index: 100;
            display: flex; align-items: center; justify-content: center; gap: 1rem;
            padding: 0.6rem 1.2rem;
            background: rgba(10,10,10,0.7);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            border: 1px solid rgba(0,212,255,0.3);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            width: fit-content; margin: 0 auto;
        }

        .page-nav-overlay .btn-icon {
            background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.3);
            color: var(--primary); width: 36px; height: 36px;
            font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
        }
        .page-nav-overlay .btn-icon:hover { background: rgba(0,212,255,0.2); transform: scale(1.1); }
        .page-nav-overlay .page-info { font-family: 'Space Mono', monospace; color: var(--text-primary); font-size: 0.9rem; font-weight: 600; min-width: 100px; text-align: center; }
        .page-nav-overlay .page-info span { color: var(--primary); }

        /* PDF Page with Annotation Layer */
        .page-container {
            position: relative;
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6), 0 0 30px rgba(0,212,255,0.1);
            overflow: hidden;
            width: 100%;
            max-width: 900px;
            user-select: none;
        }

        .page-container.editing {
            cursor: crosshair;
            user-select: none;
        }

        #pdf-canvas { display: block; cursor: text; width: 100%; height: auto; }

        /* Annotation Canvas - overlay */
        #annotation-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            cursor: crosshair;
            display: none;
            touch-action: none;
        }

        #annotation-canvas.active { display: block; }

        .text-layer {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden; opacity: 0.2; line-height: 1.0;
            pointer-events: none;
        }

        /* Annotation Toolbar */
        .annotation-toolbar {
            background: var(--bg-elevated);
            border-radius: 12px;
            padding: 0.75rem;
            display: none;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
            border: 1px solid rgba(0,212,255,0.3);
            box-shadow: 0 0 20px rgba(0,212,255,0.1);
            margin-bottom: 1rem;
        }

        .annotation-toolbar.active { display: flex; }

        .tool-group {
            display: flex; gap: 0.4rem; align-items: center;
            padding-right: 0.75rem;
            border-right: 1px solid var(--border);
        }
        .tool-group:last-child { border-right: none; }

        .tool-btn {
            padding: 0.5rem 0.9rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-primary);
            cursor: pointer; transition: all 0.3s;
            font-size: 0.8rem;
            display: flex; align-items: center; gap: 0.3rem;
        }
        .tool-btn:hover { border-color: var(--primary); color: var(--primary); box-shadow: 0 0 15px rgba(0,212,255,0.2); }
        .tool-btn.active { background: var(--gradient-button); border-color: var(--primary); color: #000; font-weight: 600; }

        .color-picker {
            width: 36px; height: 36px;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            background: transparent;
        }
        .color-picker:hover { border-color: var(--primary); }

        .size-slider {
            width: 100px;
            accent-color: var(--primary);
        }

        .zoom-controls {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(26,26,26,0.9);
            backdrop-filter: blur(10px);
            border-radius: 10px; border: 1px solid var(--border);
        }
        .zoom-value { min-width: 60px; text-align: center; font-family: 'Space Mono', monospace; font-size: 0.85rem; color: var(--primary); }

        /* Text Input for annotation */
        .text-input-overlay {
            position: absolute;
            background: transparent;
            border: 2px dashed var(--primary);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            padding: 4px 8px;
            min-width: 100px;
            outline: none;
            z-index: 50;
            display: none;
            box-shadow: 0 0 10px rgba(0,212,255,0.3);
        }
        .text-input-overlay.active { display: block; }

        /* Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9); z-index: 2000;
            align-items: center; justify-content: center; padding: 2rem;
        }
        .modal.active { display: flex; }

        .modal-content {
            background: var(--gradient-card); border-radius: 16px; padding: 1.5rem;
            max-width: 600px; width: 100%; max-height: 80vh; overflow-y: auto;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 40px rgba(0,212,255,0.1);
            position: relative;
        }
        .modal-content::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: var(--gradient-button); border-radius: 16px 16px 0 0;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .modal-title { font-size: 1.3rem; font-weight: 600; color: var(--primary); }
        .modal-close {
            background: none; border: none; color: var(--text-secondary);
            font-size: 1.5rem; cursor: pointer; padding: 0.4rem;
            width: 36px; height: 36px; border-radius: 8px; transition: all 0.3s;
        }
        .modal-close:hover { background: var(--bg-elevated); color: var(--primary); }

        .text-area {
            width: 100%; min-height: 250px; padding: 0.75rem;
            border: 1px solid var(--border); border-radius: 8px;
            background: var(--bg-elevated); color: var(--text-primary);
            font-family: 'Space Mono', monospace; font-size: 0.85rem;
            resize: vertical; margin-bottom: 1rem;
        }

        .loading { display: none; text-align: center; padding: 2rem; }
        .loading.active { display: block; }
        .spinner {
            width: 45px; height: 45px;
            border: 3px solid var(--border); border-top-color: var(--primary);
            border-radius: 50%; animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast */
        .toast {
            position: fixed; bottom: 2rem; right: 2rem;
            background: var(--bg-elevated); color: var(--text-primary);
            padding: 0.85rem 1.25rem; border-radius: 10px;
            border: 1px solid var(--primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 0 20px rgba(0,212,255,0.2);
            display: none; align-items: center; gap: 0.75rem; z-index: 3000;
            animation: slideIn 0.3s ease;
        }
        .toast.show { display: flex; }
        @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast-icon { font-size: 1.2rem; color: var(--primary); }

        #file-input { display: none; }

        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        @media (max-width: 768px) {
            .logo-text { font-size: 1.2rem; }
            .logo-icon { width: 40px; height: 40px; font-size: 1.5rem; }
            .app-header { padding: 0.6rem 1rem; margin: 0.25rem; border-radius: 12px; }
            .toolbar { padding: 0.75rem; }
            .search-container { min-width: 100%; order: -1; }
            .viewer-container { padding: 0.75rem; }
        }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <div class="logo-3d">
                <div class="logo-icon">📖</div>
                <div class="logo-text">PDF·Leitor</div>
            </div>
        </div>
    </header>

    <div class="main-container">
        <div class="toolbar">
            <div class="toolbar-group">
                <input type="file" id="file-input" accept=".pdf">
                <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">
                    📂 Abrir PDF
                </button>
            </div>
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="search-input" placeholder="Pesquisar... (Ctrl+F)">
            </div>
            <div class="toolbar-group">
                <button class="btn btn-secondary btn-icon" id="copy-text-btn" title="Copiar texto">📋</button>
                <button class="btn btn-secondary btn-icon" id="edit-btn" title="Editar / Anotar">✏️</button>
                <button class="btn btn-secondary btn-icon" id="download-btn" title="Baixar PDF">⬇</button>
            </div>
        </div>

        <!-- Annotation Toolbar (hidden by default) -->
        <div class="annotation-toolbar" id="annotation-toolbar">
            <div class="tool-group">
                <button class="tool-btn active" data-tool="pen" title="Caneta livre">🖊️ Caneta</button>
                <button class="tool-btn" data-tool="highlight" title="Realçar">🖍️ Realçar</button>
                <button class="tool-btn" data-tool="underline" title="Sublinhar">✏️ Sublinhar</button>
                <button class="tool-btn" data-tool="text" title="Adicionar texto">📝 Texto</button>
                <button class="tool-btn" data-tool="rectangle" title="Retângulo">⬜ Retângulo</button>
                <button class="tool-btn" data-tool="arrow" title="Seta">➡️ Seta</button>
            </div>
            <div class="tool-group">
                <input type="color" class="color-picker" id="annotation-color" value="#ff0000" title="Cor">
                <input type="range" class="size-slider" id="annotation-size" min="1" max="20" value="3" title="Espessura">
                <span id="size-label" style="font-size: 0.75rem; color: var(--text-secondary); min-width: 20px;">3</span>
            </div>
            <div class="tool-group">
                <button class="tool-btn" id="undo-btn" title="Desfazer">️ Desfazer</button>
                <button class="tool-btn" id="clear-btn" title="Limpar página">🗑️ Limpar</button>
                <button class="btn btn-primary" id="save-annotations" title="Salvar anotações">💾 Salvar</button>
                <button class="btn btn-secondary" id="exit-edit" title="Sair do modo edição">✕ Sair</button>
            </div>
        </div>

        <div class="viewer-container">
            <div class="empty-state" id="empty-state">
                <div class="empty-icon">📂</div>
                <div class="empty-title">Nenhum PDF aberto</div>
                <p>Toque em <strong>+ Abrir PDF</strong> para carregar arquivos do seu dispositivo.</p>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Carregando PDF…</p>
            </div>

            <div class="pdf-wrapper" id="pdf-wrapper">
                <div class="page-nav-overlay">
                    <button class="btn-icon" id="prev-page">‹</button>
                    <div class="page-info"><span id="current-page">1</span> / <span id="total-pages">—</span></div>
                    <button class="btn-icon" id="next-page">›</button>
                </div>

                <div class="page-container" id="page-container">
                    <canvas id="pdf-canvas"></canvas>
                    <canvas id="annotation-canvas"></canvas>
                    <div class="text-layer" id="text-layer"></div>
                    <textarea class="text-input-overlay" id="text-input-overlay" placeholder="Digite aqui..."></textarea>
                </div>

                <div class="zoom-controls">
                    <button class="btn btn-secondary btn-icon" id="zoom-out">−</button>
                    <span class="zoom-value" id="zoom-value">100%</span>
                    <button class="btn btn-secondary btn-icon" id="zoom-in">+</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Text Extraction Modal -->
    <div class="modal" id="extract-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">✏️ Texto extraído — Página <span id="extract-page-num">1</span></h2>
                <button class="modal-close" onclick="closeExtractModal()"></button>
            </div>
            <textarea class="text-area" id="extracted-text" readonly></textarea>
            <div class="toolbar-group">
                <button class="btn btn-primary" onclick="copyExtractedText()">📋 Copiar tudo</button>
                <button class="btn btn-secondary" onclick="downloadExtractedText()">💾 Salvar .txt</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <span class="toast-icon">✓</span>
        <span id="toast-message">Operação realizada com sucesso!</span>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // State
        let pdfDoc = null;
        let currentPage = 1;
        let scale = 1.5;
        let currentTool = 'pen';
        let selectedText = '';
        let isEditing = false;
        let isDrawing = false;
        let lastX = 0, lastY = 0;
        let annotations = {}; // { pageNum: [ {tool, points, color, size, text, x, y} ] }
        let undoStack = [];
        let redoStack = [];
        let startX = 0, startY = 0;
        let tempCanvas, tempCtx;

        // Elements
        const fileInput = document.getElementById('file-input');
        const emptyState = document.getElementById('empty-state');
        const loading = document.getElementById('loading');
        const pdfWrapper = document.getElementById('pdf-wrapper');
        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        const annotationCanvas = document.getElementById('annotation-canvas');
        const annCtx = annotationCanvas.getContext('2d');
        const textLayer = document.getElementById('text-layer');
        const annotationToolbar = document.getElementById('annotation-toolbar');
        const pageContainer = document.getElementById('page-container');
        const textInputOverlay = document.getElementById('text-input-overlay');

        // File Input
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file && file.type === 'application/pdf') {
                await loadPDF(file);
            }
        });

        async function loadPDF(file) {
            showLoading();
            try {
                const arrayBuffer = await file.arrayBuffer();
                pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                emptyState.style.display = 'none';
                pdfWrapper.classList.add('active');
                document.getElementById('total-pages').textContent = pdfDoc.numPages;
                currentPage = 1;
                await renderPage(currentPage);
                hideLoading();
                showToast('PDF carregado com sucesso!');
            } catch (error) {
                console.error(error);
                showToast('Erro ao carregar PDF', 'error');
                hideLoading();
            }
        }

        async function renderPage(num) {
            if (!pdfDoc) return;
            const page = await pdfDoc.getPage(num);
            const viewport = page.getViewport({ scale });
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            await page.render({ canvasContext: ctx, viewport }).promise;
            await renderTextLayer(page, viewport);
            document.getElementById('current-page').textContent = num;
            currentPage = num;
            setupAnnotationCanvas(viewport);
            loadAnnotationsForPage(num);
        }

        function setupAnnotationCanvas(viewport) {
            annotationCanvas.width = viewport.width;
            annotationCanvas.height = viewport.height;
            annotationCanvas.style.width = viewport.width + 'px';
            annotationCanvas.style.height = viewport.height + 'px';
            // Clear annotation canvas
            annCtx.clearRect(0, 0, annotationCanvas.width, annotationCanvas.height);
        }

        async function renderTextLayer(page, viewport) {
            const textContent = await page.getTextContent();
            textLayer.innerHTML = '';
            textContent.items.forEach(item => {
                const textDiv = document.createElement('div');
                textDiv.className = 'text-item';
                textDiv.style.position = 'absolute';
                textDiv.style.left = `${item.transform[4]}px`;
                textDiv.style.top = `${item.transform[5]}px`;
                textDiv.style.fontSize = `${item.transform[0]}px`;
                textDiv.style.transform = `rotate(${Math.atan2(item.transform[2], item.transform[0]) * 180 / Math.PI}deg)`;
                textDiv.textContent = item.str;
                textLayer.appendChild(textDiv);
            });
            textLayer.style.width = `${viewport.width}px`;
            textLayer.style.height = `${viewport.height}px`;
        }

        // ===== EDIT MODE TOGGLE =====
        const editBtn = document.getElementById('edit-btn');
        editBtn.addEventListener('click', () => {
            if (!pdfDoc) {
                showToast('Abra um PDF primeiro', 'warning');
                return;
            }
            isEditing = !isEditing;
            if (isEditing) {
                annotationToolbar.classList.add('active');
                annotationCanvas.classList.add('active');
                pageContainer.classList.add('editing');
                editBtn.classList.add('active');
                showToast('Modo edição ativado! Escolha uma ferramenta.');
            } else {
                exitEditMode();
            }
        });

        function exitEditMode() {
            isEditing = false;
            annotationToolbar.classList.remove('active');
            annotationCanvas.classList.remove('active');
            pageContainer.classList.remove('editing');
            editBtn.classList.remove('active');
            textInputOverlay.classList.remove('active');
        }

        document.getElementById('exit-edit').addEventListener('click', exitEditMode);

        // ===== TOOL SELECTION =====
        document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTool = btn.dataset.tool;
                if (currentTool === 'text') {
                    annotationCanvas.style.cursor = 'text';
                } else {
                    annotationCanvas.style.cursor = 'crosshair';
                }
            });
        });

        // Color and size
        const colorPicker = document.getElementById('annotation-color');
        const sizeSlider = document.getElementById('annotation-size');
        const sizeLabel = document.getElementById('size-label');
        sizeSlider.addEventListener('input', () => {
            sizeLabel.textContent = sizeSlider.value;
        });

        // ===== DRAWING =====
        function getPos(e) {
            const rect = annotationCanvas.getBoundingClientRect();
            const scaleX = annotationCanvas.width / rect.width;
            const scaleY = annotationCanvas.height / rect.height;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        annotationCanvas.addEventListener('mousedown', startDraw);
        annotationCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e); });
        annotationCanvas.addEventListener('mousemove', draw);
        annotationCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
        annotationCanvas.addEventListener('mouseup', endDraw);
        annotationCanvas.addEventListener('touchend', endDraw);
        annotationCanvas.addEventListener('mouseleave', endDraw);

        function startDraw(e) {
            if (!isEditing) return;
            const pos = getPos(e);

            if (currentTool === 'text') {
                showTextInput(pos.x, pos.y);
                return;
            }

            isDrawing = true;
            startX = pos.x;
            startY = pos.y;
            lastX = pos.x;
            lastY = pos.y;

            // Save state for undo
            saveUndoState();

            if (currentTool === 'pen' || currentTool === 'highlight' || currentTool === 'underline') {
                annCtx.beginPath();
                annCtx.moveTo(pos.x, pos.y);
            }
        }

        function draw(e) {
            if (!isDrawing || !isEditing) return;
            const pos = getPos(e);
            const color = colorPicker.value;
            const size = parseInt(sizeSlider.value);

            if (currentTool === 'pen') {
                annCtx.strokeStyle = color;
                annCtx.lineWidth = size;
                annCtx.lineCap = 'round';
                annCtx.lineJoin = 'round';
                annCtx.globalAlpha = 1;
                annCtx.lineTo(pos.x, pos.y);
                annCtx.stroke();
            } else if (currentTool === 'highlight') {
                annCtx.strokeStyle = color;
                annCtx.lineWidth = size * 4;
                annCtx.lineCap = 'round';
                annCtx.lineJoin = 'round';
                annCtx.globalAlpha = 0.3;
                annCtx.lineTo(pos.x, pos.y);
                annCtx.stroke();
            } else if (currentTool === 'underline') {
                annCtx.strokeStyle = color;
                annCtx.lineWidth = Math.max(2, size * 0.8);
                annCtx.lineCap = 'round';
                annCtx.globalAlpha = 1;
                // Draw straight line from start to current
                annCtx.clearRect(0, 0, annotationCanvas.width, annotationCanvas.height);
                redrawAnnotations();
                annCtx.beginPath();
                annCtx.moveTo(startX, startY);
                annCtx.lineTo(pos.x, pos.y);
                annCtx.stroke();
            } else if (currentTool === 'rectangle' || currentTool === 'arrow') {
                annCtx.clearRect(0, 0, annotationCanvas.width, annotationCanvas.height);
                redrawAnnotations();
                annCtx.strokeStyle = color;
                annCtx.lineWidth = size;
                annCtx.globalAlpha = 1;
                annCtx.beginPath();
                if (currentTool === 'rectangle') {
                    annCtx.rect(startX, startY, pos.x - startX, pos.y - startY);
                    annCtx.stroke();
                } else {
                    annCtx.moveTo(startX, startY);
                    annCtx.lineTo(pos.x, pos.y);
                    annCtx.stroke();
                    // Arrow head
                    const angle = Math.atan2(pos.y - startY, pos.x - startX);
                    const headLen = 15;
                    annCtx.beginPath();
                    annCtx.moveTo(pos.x, pos.y);
                    annCtx.lineTo(pos.x - headLen * Math.cos(angle - Math.PI/6), pos.y - headLen * Math.sin(angle - Math.PI/6));
                    annCtx.moveTo(pos.x, pos.y);
                    annCtx.lineTo(pos.x - headLen * Math.cos(angle + Math.PI/6), pos.y - headLen * Math.sin(angle + Math.PI/6));
                    annCtx.stroke();
                }
            }

            lastX = pos.x;
            lastY = pos.y;
        }

        function endDraw(e) {
            if (!isDrawing) return;
            isDrawing = false;
            annCtx.globalAlpha = 1;

            // Save annotation
            if (!annotations[currentPage]) annotations[currentPage] = [];
            
            const pos = e.changedTouches ? 
                { x: (e.changedTouches[0].clientX - annotationCanvas.getBoundingClientRect().left) * (annotationCanvas.width / annotationCanvas.getBoundingClientRect().width),
                  y: (e.changedTouches[0].clientY - annotationCanvas.getBoundingClientRect().top) * (annotationCanvas.height / annotationCanvas.getBoundingClientRect().height) } :
                getPos(e);

            annotations[currentPage].push({
                tool: currentTool,
                color: colorPicker.value,
                size: parseInt(sizeSlider.value),
                startX, startY,
                endX: pos.x, endY: pos.y
            });
        }

        function redrawAnnotations() {
            const pageAnnotations = annotations[currentPage] || [];
            annCtx.clearRect(0, 0, annotationCanvas.width, annotationCanvas.height);
            
            pageAnnotations.forEach(ann => {
                annCtx.strokeStyle = ann.color;
                annCtx.lineWidth = ann.size;
                annCtx.lineCap = 'round';
                annCtx.lineJoin = 'round';
                annCtx.globalAlpha = ann.tool === 'highlight' ? 0.3 : 1;
                annCtx.beginPath();

                if (ann.tool === 'pen' || ann.tool === 'underline') {
                    annCtx.moveTo(ann.startX, ann.startY);
                    annCtx.lineTo(ann.endX, ann.endY);
                    annCtx.stroke();
                } else if (ann.tool === 'highlight') {
                    annCtx.lineWidth = ann.size * 4;
                    annCtx.moveTo(ann.startX, ann.startY);
                    annCtx.lineTo(ann.endX, ann.endY);
                    annCtx.stroke();
                } else if (ann.tool === 'rectangle') {
                    annCtx.rect(ann.startX, ann.startY, ann.endX - ann.startX, ann.endY - ann.startY);
                    annCtx.stroke();
                } else if (ann.tool === 'arrow') {
                    annCtx.moveTo(ann.startX, ann.startY);
                    annCtx.lineTo(ann.endX, ann.endY);
                    annCtx.stroke();
                    const angle = Math.atan2(ann.endY - ann.startY, ann.endX - ann.startX);
                    const headLen = 15;
                    annCtx.beginPath();
                    annCtx.moveTo(ann.endX, ann.endY);
                    annCtx.lineTo(ann.endX - headLen * Math.cos(angle - Math.PI/6), ann.endY - headLen * Math.sin(angle - Math.PI/6));
                    annCtx.moveTo(ann.endX, ann.endY);
                    annCtx.lineTo(ann.endX - headLen * Math.cos(angle + Math.PI/6), ann.endY - headLen * Math.sin(angle + Math.PI/6));
                    annCtx.stroke();
                }
            });
            annCtx.globalAlpha = 1;
        }

        function loadAnnotationsForPage(num) {
            annCtx.clearRect(0, 0, annotationCanvas.width, annotationCanvas.height);
            redrawAnnotations();
        }

        // ===== TEXT INPUT =====
        function showTextInput(x, y) {
            textInputOverlay.style.left = x + 'px';
            textInputOverlay.style.top = y + 'px';
            textInputOverlay.style.color = colorPicker.value;
            textInputOverlay.style.fontSize = (parseInt(sizeSlider.value) * 5 + 10) + 'px';
            textInputOverlay.classList.add('active');
            textInputOverlay.value = '';
            textInputOverlay.focus();
        }

        textInputOverlay.addEventListener('blur', () => {
            const text = textInputOverlay.value.trim();
            if (text) {
                saveUndoState();
                const x = parseFloat(textInputOverlay.style.left);
                const y = parseFloat(textInputOverlay.style.top);
                if (!annotations[currentPage]) annotations[currentPage] = [];
                annotations[currentPage].push({
                    tool: 'text',
                    text: text,
                    x: x, y: y,
                    color: colorPicker.value,
                    size: parseInt(sizeSlider.value)
                });
                redrawAnnotationsWithText();
                showToast('Texto adicionado!');
            }
            textInputOverlay.classList.remove('active');
        });

        textInputOverlay.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                textInputOverlay.blur();
            }
        });

        function redrawAnnotationsWithText() {
            redrawAnnotations();
            const pageAnnotations = annotations[currentPage] || [];
            pageAnnotations.forEach(ann => {
                if (ann.tool === 'text') {
                    annCtx.fillStyle = ann.color;
                    annCtx.font = `${ann.size * 5 + 10}px 'DM Sans', sans-serif`;
                    annCtx.globalAlpha = 1;
                    annCtx.fillText(ann.text, ann.x, ann.y + ann.size * 5 + 10);
                }
            });
        }

        // ===== UNDO / CLEAR =====
        function saveUndoState() {
            undoStack.push(JSON.parse(JSON.stringify(annotations[currentPage] || [])));
            if (undoStack.length > 30) undoStack.shift();
            redoStack = [];
        }

        document.getElementById('undo-btn').addEventListener('click', () => {
            if (undoStack.length === 0) {
                showToast('Nada para desfazer', 'warning');
                return;
            }
            annotations[currentPage] = undoStack.pop();
            redrawAnnotationsWithText();
            showToast('Desfeito!');
        });

        document.getElementById('clear-btn').addEventListener('click', () => {
            if (confirm('Limpar todas as anotações desta página?')) {
                saveUndoState();
                annotations[currentPage] = [];
                annCtx.clearRect(0, 0, annotationCanvas.width, annotationCanvas.height);
                showToast('Anotações limpas!');
            }
        });

        // ===== SAVE ANNOTATIONS =====
        document.getElementById('save-annotations').addEventListener('click', () => {
            try {
                const data = JSON.stringify(annotations);
                localStorage.setItem('pdf-annotations', data);
                showToast('Anotações salvas com sucesso! ');
            } catch (e) {
                showToast('Erro ao salvar', 'error');
            }
        });

        // Load saved annotations
        function loadSavedAnnotations() {
            try {
                const data = localStorage.getItem('pdf-annotations');
                if (data) annotations = JSON.parse(data);
            } catch (e) {}
        }
        loadSavedAnnotations();

        // ===== PAGE NAVIGATION =====
        document.getElementById('prev-page').addEventListener('click', () => {
            if (currentPage > 1) renderPage(currentPage - 1);
        });
        document.getElementById('next-page').addEventListener('click', () => {
            if (pdfDoc && currentPage < pdfDoc.numPages) renderPage(currentPage + 1);
        });

        // ===== ZOOM =====
        document.getElementById('zoom-in').addEventListener('click', () => {
            scale += 0.25; updateZoom();
        });
        document.getElementById('zoom-out').addEventListener('click', () => {
            if (scale > 0.5) { scale -= 0.25; updateZoom(); }
        });
        function updateZoom() {
            document.getElementById('zoom-value').textContent = `${Math.round(scale * 100)}%`;
            renderPage(currentPage);
        }

        // ===== SEARCH =====
        const searchInput = document.getElementById('search-input');
        searchInput.addEventListener('input', debounce(async (e) => {
            const query = e.target.value.trim();
            if (query.length < 2) return;
            // Simple search - navigate to page with match
            for (let p = 1; p <= pdfDoc.numPages; p++) {
                const page = await pdfDoc.getPage(p);
                const tc = await page.getTextContent();
                const text = tc.items.map(i => i.str).join(' ');
                if (text.toLowerCase().includes(query.toLowerCase())) {
                    if (p !== currentPage) {
                        currentPage = p;
                        await renderPage(p);
                        showToast(`Encontrado na página ${p}`);
                    }
                    break;
                }
            }
        }, 500));

        // ===== COPY TEXT =====
        document.getElementById('copy-text-btn').addEventListener('click', async () => {
            if (!pdfDoc) { showToast('Abra um PDF primeiro', 'warning'); return; }
            const page = await pdfDoc.getPage(currentPage);
            const tc = await page.getTextContent();
            const text = tc.items.map(i => i.str).join(' ');
            navigator.clipboard.writeText(text);
            showToast('Texto copiado!');
        });

        // ===== EXTRACT TEXT =====
        document.getElementById('edit-btn').addEventListener('dblclick', async () => {
            if (!pdfDoc) { showToast('Abra um PDF primeiro', 'warning'); return; }
            const page = await pdfDoc.getPage(currentPage);
            const tc = await page.getTextContent();
            const text = tc.items.map(i => i.str).join(' ');
            document.getElementById('extracted-text').value = text;
            document.getElementById('extract-page-num').textContent = currentPage;
            document.getElementById('extract-modal').classList.add('active');
        });

        function closeExtractModal() { document.getElementById('extract-modal').classList.remove('active'); }
        function copyExtractedText() {
            navigator.clipboard.writeText(document.getElementById('extracted-text').value);
            showToast('Texto copiado!');
        }
        function downloadExtractedText() {
            const text = document.getElementById('extracted-text').value;
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `pagina-${currentPage}.txt`;
            a.click(); URL.revokeObjectURL(url);
            showToast('Arquivo salvo!');
        }

        // ===== DOWNLOAD PDF =====
        document.getElementById('download-btn').addEventListener('click', () => {
            showToast('Funcionalidade de download em desenvolvimento', 'warning');
        });

        // ===== KEYBOARD =====
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'f') { e.preventDefault(); searchInput.focus(); }
            if (e.ctrlKey && e.key === 'z' && isEditing) {
                e.preventDefault();
                document.getElementById('undo-btn').click();
            }
            if (e.key === 'Escape' && isEditing) { exitEditMode(); }
        });

        // ===== UTILS =====
        function showLoading() { loading.classList.add('active'); emptyState.style.display = 'none'; pdfWrapper.classList.remove('active'); }
        function hideLoading() { loading.classList.remove('active'); }
        function showToast(msg, type = 'success') {
            document.getElementById('toast-message').textContent = msg;
            document.getElementById('toast').classList.add('show');
            setTimeout(() => document.getElementById('toast').classList.remove('show'), 3000);
        }
        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func(...args), wait);
            };
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
        }
    </script>
</body>
</html>
