<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>PDF·Leitor Pro</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        :root {
            --primary: #00d4ff;
            --primary-dark: #0099cc;
            --secondary: #00a8e8;
            --accent: #0077b6;
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --bg-dark: #000000;
            --bg-card: #0a0a0f;
            --bg-elevated: #1a1a2e;
            --bg-surface: #11111f;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --border: #2a2a3e;
            --success: #00d4ff;
            --warning: #fbbf24;
            --error: #ef4444;
            --gradient-header: linear-gradient(135deg, #000000 0%, #0a0a1f 25%, #1a1a3e 50%, #0a0a2f 75%, #000000 100%);
            --gradient-button: linear-gradient(135deg, #0077b6 0%, #00d4ff 100%);
            --gradient-card: linear-gradient(145deg, #0a0a0f 0%, #1a1a2e 100%);
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);            min-height: 100vh;
            min-height: -webkit-fill-available;
            position: relative;
            overflow-x: hidden;
            width: 100%;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(0, 212, 255, 0.08) 0%, transparent 40%),
                radial-gradient(ellipse at 80% 70%, rgba(188, 19, 254, 0.06) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        /* Header Responsivo */
        .app-header {
            background: var(--gradient-header);
            padding: 0.875rem 1rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.8), 0 0 60px rgba(0, 212, 255, 0.15);
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
            margin: 0.5rem;
            border-radius: 16px;
            width: calc(100% - 1rem);
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        .header-content { 
            max-width: 1400px; 
            margin: 0 auto; 
            position: relative;
            z-index: 1;
        }

        .logo-3d { 
            display: flex; 
            align-items: center; 
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .logo-icon {
            width: 45px;             height: 45px;
            background: linear-gradient(135deg, #000000 0%, #0a0a1f 50%, #1a1a3e 100%);
            border-radius: 12px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(0, 212, 255, 0.4);
            flex-shrink: 0;
        }

        .logo-text {
            font-size: clamp(1rem, 4vw, 1.5rem);
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #00f3ff 50%, #bc13fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
        }

        .app-subtitle {
            font-size: clamp(0.65rem, 2.5vw, 0.75rem);
            color: var(--text-secondary);
            margin-top: 0.125rem;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        /* Container Principal */
        .main-container { 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 0.5rem;
            position: relative; 
            z-index: 1;
            width: 100%;
        }

        /* Toolbar Responsiva */
        .toolbar {
            background: var(--gradient-card);
            border-radius: 12px; 
            padding: 0.75rem;
            margin-bottom: 0.75rem;
            box-shadow: 0 4px 30px rgba(0,0,0,0.6), 0 0 20px rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.2);
            display: flex; 
            flex-wrap: wrap;             gap: 0.5rem;
            align-items: center; 
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        .toolbar-group { 
            display: flex; 
            gap: 0.5rem; 
            align-items: center; 
            flex-wrap: wrap;
            flex-shrink: 1;
        }

        .btn {
            padding: clamp(0.5rem, 2vw, 0.75rem) clamp(0.75rem, 3vw, 1rem);
            border: none; 
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif; 
            font-weight: 600; 
            font-size: clamp(0.75rem, 2.5vw, 0.875rem);
            cursor: pointer; 
            transition: all 0.3s ease;
            display: inline-flex; 
            align-items: center; 
            gap: 0.4rem;
            touch-action: manipulation; 
            min-height: 44px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .btn-primary { 
            background: var(--gradient-button); 
            color: #000; 
            font-weight: 700;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }
        
        .btn-primary:active { 
            transform: scale(0.95); 
        }

        .btn-secondary { 
            background: var(--bg-elevated); 
            color: var(--text-primary); 
            border: 1px solid var(--border);
        }        
        .btn-secondary:active { 
            background: var(--bg-surface); 
            transform: scale(0.95); 
        }
        
        .btn-secondary.active { 
            background: rgba(0, 212, 255, 0.2); 
            border-color: var(--primary); 
            color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .btn-icon { 
            padding: 0.6rem; 
            border-radius: 10px; 
            width: clamp(40px, 10vw, 44px);
            height: clamp(40px, 10vw, 44px);
            justify-content: center;
            flex-shrink: 0;
        }

        /* Search Container */
        .search-container { 
            position: relative; 
            flex: 1; 
            min-width: 200px;
            max-width: 100%;
            flex-shrink: 1;
        }

        .search-input {
            width: 100%; 
            padding: 0.6rem 0.8rem 0.6rem 2.5rem;
            border: 2px solid var(--border); 
            border-radius: 10px;
            background: var(--bg-elevated); 
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif; 
            font-size: 0.875rem;
            transition: all 0.3s ease;
            min-height: 44px;
        }
        
        .search-input:focus { 
            outline: none; 
            border-color: var(--primary); 
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }
                .search-input::placeholder { 
            color: var(--text-secondary); 
        }
        
        .search-icon { 
            position: absolute; 
            left: 0.8rem; 
            top: 50%; 
            transform: translateY(-50%); 
            color: var(--primary); 
            font-size: 1rem;
        }

        /* Viewer Container */
        .viewer-container {
            background: var(--gradient-card);
            border-radius: 12px; 
            padding: 0.75rem;
            box-shadow: 0 4px 30px rgba(0,0,0,0.6), 0 0 20px rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.2);
            min-height: 60vh;
            position: relative; 
            overflow: hidden;
            width: 100%;
        }

        .empty-state { 
            text-align: center; 
            padding: 3rem 1rem; 
            color: var(--text-secondary); 
        }
        
        .empty-icon { 
            font-size: clamp(3rem, 10vw, 4rem); 
            margin-bottom: 1rem; 
            opacity: 0.5; 
        }
        
        .empty-title { 
            font-size: clamp(1.1rem, 4vw, 1.3rem); 
            margin-bottom: 0.75rem; 
            color: var(--text-primary); 
        }
        
        .empty-state strong { 
            color: var(--primary); 
        }

        .pdf-wrapper { 
            display: none;             flex-direction: column; 
            align-items: center; 
            gap: 1rem; 
            width: 100%; 
        }
        
        .pdf-wrapper.active { 
            display: flex; 
        }

        /* Page Navigation Overlay */
        .page-nav-overlay {
            position: sticky; 
            top: 0.5rem; 
            z-index: 100;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 0.75rem;
            padding: 0.5rem 1rem;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            box-shadow: 0 4px 30px rgba(0,0,0,0.6), 0 0 30px rgba(0, 212, 255, 0.2);
            width: fit-content; 
            margin: 0 auto;
            max-width: 90%;
        }

        .page-nav-overlay .btn-icon {
            background: rgba(0, 212, 255, 0.1); 
            border: 1px solid rgba(0, 212, 255, 0.3);
            color: var(--primary); 
            width: clamp(36px, 10vw, 40px);
            height: clamp(36px, 10vw, 40px);
            font-size: 1.2rem; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        
        .page-nav-overlay .btn-icon:active { 
            background: rgba(0, 212, 255, 0.3); 
            transform: scale(0.95); 
        }
                .page-nav-overlay .page-info { 
            font-family: 'Space Mono', monospace; 
            color: var(--text-primary); 
            font-size: clamp(0.8rem, 3vw, 0.9rem);
            font-weight: 600; 
            min-width: 80px; 
            text-align: center; 
            white-space: nowrap;
        }
        
        .page-nav-overlay .page-info span { 
            color: var(--primary); 
        }

        /* Page Container */
        .page-container {
            position: relative;
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6), 0 0 30px rgba(0, 212, 255, 0.1);
            overflow: hidden;
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
        }

        #pdf-canvas { 
            display: block; 
            width: 100% !important; 
            height: auto !important; 
            max-width: 100%; 
        }

        .text-layer {
            position: absolute; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0;
            overflow: hidden; 
            line-height: 1.0;
            pointer-events: auto; 
            opacity: 1;
        }

        .text-layer span {
            position: absolute;
            color: transparent !important;
            white-space: pre;
            cursor: text;            transform-origin: 0% 0%;
            user-select: text;
            -webkit-user-select: text;
        }

        #annotation-canvas {
            position: absolute; 
            top: 0; 
            left: 0;
            width: 100%; 
            height: 100%;
            cursor: crosshair;
            display: none;
            touch-action: none;
        }

        #annotation-canvas.active { 
            display: block; 
        }

        .page-container.editing { 
            user-select: none; 
        }
        
        .page-container.editing #annotation-canvas { 
            display: block; 
        }
        
        .page-container.editing .text-layer { 
            pointer-events: none; 
        }

        /* Annotation Toolbar Responsiva */
        .annotation-toolbar {
            background: var(--bg-elevated);
            border-radius: 12px; 
            padding: 0.75rem;
            display: none; 
            gap: 0.5rem;
            align-items: center; 
            flex-wrap: wrap;
            border: 1px solid rgba(0, 212, 255, 0.3);
            box-shadow: 0 4px 30px rgba(0,0,0,0.6), 0 0 20px rgba(0, 212, 255, 0.15);
            margin-bottom: 0.75rem;
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        .annotation-toolbar.active {             display: flex; 
        }

        .tool-group {
            display: flex; 
            gap: 0.4rem; 
            align-items: center;
            padding-right: 0.5rem;
            border-right: 1px solid var(--border);
            flex-wrap: wrap;
            flex-shrink: 1;
        }
        
        .tool-group:last-child { 
            border-right: none; 
        }

        .tool-btn {
            padding: clamp(0.4rem, 2vw, 0.6rem) clamp(0.5rem, 2.5vw, 0.75rem);
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--bg-card);
            color: var(--text-primary);
            cursor: pointer; 
            transition: all 0.3s ease;
            font-size: clamp(0.7rem, 2.5vw, 0.8rem);
            display: flex; 
            align-items: center; 
            gap: 0.3rem;
            min-height: 40px;
            touch-action: manipulation;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .tool-btn:active { 
            transform: scale(0.95); 
        }
        
        .tool-btn.active { 
            background: var(--gradient-button); 
            border-color: var(--primary); 
            color: #000; 
            font-weight: 600;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        .color-picker { 
            width: clamp(36px, 8vw, 40px);
            height: clamp(36px, 8vw, 40px);            border: 2px solid var(--border); 
            border-radius: 10px; 
            cursor: pointer; 
            background: transparent;
            flex-shrink: 0;
        }
        
        .size-slider { 
            width: clamp(60px, 15vw, 80px);
            accent-color: var(--primary);
            flex-shrink: 0;
        }

        .zoom-controls {
            display: flex; 
            align-items: center; 
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(26, 26, 30, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 10px; 
            border: 1px solid var(--border);
            flex-shrink: 0;
        }
        
        .zoom-value { 
            min-width: 50px; 
            text-align: center; 
            font-family: 'Space Mono', monospace; 
            font-size: clamp(0.8rem, 2.5vw, 0.875rem);
            color: var(--primary); 
        }

        /* Modal Responsivo */
        .modal {
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0;
            background: rgba(0,0,0,0.95); 
            z-index: 2000;
            align-items: center; 
            justify-content: center; 
            padding: 1rem;
            backdrop-filter: blur(10px);
        }
        
        .modal.active {             display: flex; 
        }

        .modal-content {
            background: var(--gradient-card); 
            border-radius: 16px; 
            padding: 1.25rem;
            max-width: 600px; 
            width: 100%; 
            max-height: 90vh; 
            overflow-y: auto;
            border: 1px solid rgba(0, 212, 255, 0.3);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 40px rgba(0, 212, 255, 0.2);
            position: relative;
        }
        
        .modal-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .modal-title { 
            font-size: clamp(1rem, 4vw, 1.2rem);
            font-weight: 600; 
            color: var(--primary); 
        }
        
        .modal-close {
            background: none; 
            border: none; 
            color: var(--text-secondary);
            font-size: 1.5rem; 
            cursor: pointer; 
            padding: 0.4rem;
            width: 40px; 
            height: 40px; 
            border-radius: 8px;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .text-area {
            width: 100%; 
            min-height: 200px; 
            padding: 0.75rem;
            border: 1px solid var(--border);             border-radius: 10px;
            background: var(--bg-elevated); 
            color: var(--text-primary);
            font-family: 'Space Mono', monospace; 
            font-size: clamp(0.8rem, 2.5vw, 0.875rem);
            resize: vertical; 
            margin-bottom: 1rem;
        }

        /* Loading */
        .loading { 
            display: none; 
            text-align: center; 
            padding: 2rem; 
        }
        
        .loading.active { 
            display: block; 
        }
        
        .spinner {
            width: 50px; 
            height: 50px;
            border: 3px solid var(--border); 
            border-top-color: var(--primary);
            border-radius: 50%; 
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        
        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }

        /* Toast Responsivo */
        .toast {
            position: fixed; 
            bottom: 1rem; 
            right: 1rem; 
            left: 1rem;
            background: var(--bg-elevated); 
            color: var(--text-primary);
            padding: 0.875rem 1.25rem; 
            border-radius: 12px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 0 20px rgba(0, 212, 255, 0.2);
            display: none; 
            align-items: center; 
            gap: 0.75rem; 
            z-index: 3000;            animation: slideIn 0.3s ease;
            max-width: 400px; 
            margin: 0 auto;
            backdrop-filter: blur(10px);
        }
        
        .toast.show { 
            display: flex; 
        }
        
        @keyframes slideIn { 
            from { transform: translateY(100px); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }

        #file-input { 
            display: none; 
        }

        ::-webkit-scrollbar { 
            width: 8px; 
            height: 8px; 
        }
        
        ::-webkit-scrollbar-track { 
            background: var(--bg-dark); 
        }
        
        ::-webkit-scrollbar-thumb { 
            background: var(--border); 
            border-radius: 4px; 
        }

        /* MEDIA QUERIES - MOBILE */
        @media (max-width: 768px) {
            html {
                font-size: 14px;
            }

            .app-header { 
                padding: 0.625rem 0.75rem;
                margin: 0.25rem;
                border-radius: 12px;
            }

            .logo-icon { 
                width: 38px; 
                height: 38px; 
                font-size: 1.3rem; 
            }
            .main-container { 
                padding: 0.375rem; 
            }

            .toolbar { 
                padding: 0.625rem;
                gap: 0.375rem; 
            }

            .search-container { 
                min-width: 100%; 
                order: -1; 
                flex-basis: 100%;
                margin-bottom: 0.25rem;
            }

            .viewer-container { 
                padding: 0.5rem; 
                min-height: 50vh; 
            }

            .page-nav-overlay { 
                padding: 0.375rem 0.75rem;
                gap: 0.5rem;
            }

            .annotation-toolbar { 
                padding: 0.5rem; 
                gap: 0.375rem;
            }

            .tool-group {
                gap: 0.25rem;
                padding-right: 0.375rem;
            }

            .tool-btn span {
                display: none;
            }

            .tool-btn {
                padding: 0.4rem 0.5rem;
                font-size: 0.7rem;
            }

            .zoom-controls { 
                padding: 0.375rem 0.75rem;
            }
            .modal-content { 
                padding: 1rem; 
                margin: 0.5rem;
            }

            .toast { 
                bottom: 0.5rem; 
                left: 0.5rem; 
                right: 0.5rem;
                padding: 0.75rem 1rem;
            }
        }

        @media (max-width: 480px) {
            html {
                font-size: 13px;
            }

            .logo-text { 
                font-size: 1rem; 
            }

            .logo-icon { 
                width: 35px; 
                height: 35px; 
                font-size: 1.2rem; 
            }

            .btn span {
                display: none;
            }

            .btn-icon {
                width: 40px;
                height: 40px;
            }

            .toolbar-group {
                gap: 0.25rem;
            }

            .tool-btn {
                min-width: 36px;
                justify-content: center;
            }

            .tool-btn span {
                display: none;
            }
            .color-picker {
                width: 36px;
                height: 36px;
            }

            .size-slider {
                width: 60px;
            }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            .app-header { 
                padding: 0.5rem 0.75rem;
            }

            .viewer-container { 
                min-height: 60vh; 
            }

            .toolbar {
                margin-bottom: 0.5rem;
            }
        }

        /* Touch device optimizations */
        @media (hover: none) {
            .btn:hover {
                transform: none;
            }
            
            .btn:active {
                transform: scale(0.95);
            }
            
            .tool-btn:hover {
                transform: none;
            }
            
            .tool-btn:active {
                transform: scale(0.95);
            }
        }

        /* Prevent text selection on UI elements */
        .btn, .tool-btn, .page-nav-overlay, .toolbar {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }    </style>
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <div class="logo-3d">
                <div class="logo-icon">📄</div>
                <div>
                    <div class="logo-text">PDF·Leitor Pro</div>
                    <div class="app-subtitle">LEITOR & EDITOR AVANÇADO</div>
                </div>
            </div>
        </div>
    </header>

    <div class="main-container">
        <div class="toolbar">
            <div class="toolbar-group">
                <input type="file" id="file-input" accept=".pdf">
                <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">
                    📂 <span>Abrir PDF</span>
                </button>
            </div>
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="search-input" placeholder="Pesquisar...">
            </div>
            <div class="toolbar-group">
                <button class="btn btn-secondary btn-icon" id="copy-text-btn" title="Copiar texto">📋</button>
                <button class="btn btn-secondary btn-icon" id="edit-btn" title="Editar / Anotar">✏️</button>
                <button class="btn btn-secondary btn-icon" id="download-btn" title="Baixar PDF">⬇</button>
            </div>
        </div>

        <div class="annotation-toolbar" id="annotation-toolbar">
            <div class="tool-group">
                <button class="tool-btn active" data-tool="pen">🖊️ <span>Caneta</span></button>
                <button class="tool-btn" data-tool="highlight-line">🖍️ <span>Realçar</span></button>
                <button class="tool-btn" data-tool="underline">✏️ <span>Sublinhar</span></button>
                <button class="tool-btn" data-tool="text">📝 <span>Texto</span></button>
                <button class="tool-btn" data-tool="eraser">🧽 <span>Borracha</span></button>
            </div>
            <div class="tool-group">
                <input type="color" class="color-picker" id="annotation-color" value="#ffff00">
                <input type="range" class="size-slider" id="annotation-size" min="1" max="30" value="15">
            </div>
            <div class="tool-group">
                <button class="tool-btn" id="undo-btn">↩️ <span>Desfazer</span></button>
                <button class="tool-btn" id="clear-btn">🗑️ <span>Limpar</span></button>
                <button class="btn btn-primary" id="save-annotations">💾 <span>Salvar</span></button>                <button class="btn btn-secondary" id="exit-edit">✕ <span>Sair</span></button>
            </div>
        </div>

        <div class="viewer-container">
            <div class="empty-state" id="empty-state">
                <div class="empty-icon">📂</div>
                <div class="empty-title">Nenhum PDF aberto</div>
                <p>Toque em <strong>+ Abrir PDF</strong> para carregar arquivos do seu dispositivo.</p>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Carregando PDF…</p>
            </div>

            <div class="pdf-wrapper" id="pdf-wrapper">
                <div class="page-nav-overlay">
                    <button class="btn-icon" id="prev-page">‹</button>
                    <div class="page-info"><span id="current-page">1</span> / <span id="total-pages">—</span></div>
                    <button class="btn-icon" id="next-page">›</button>
                </div>

                <div class="page-container" id="page-container">
                    <canvas id="pdf-canvas"></canvas>
                    <canvas id="annotation-canvas"></canvas>
                    <div class="text-layer" id="text-layer"></div>
                    <textarea class="text-input-overlay" id="text-input-overlay" placeholder="Digite aqui..." style="display:none;"></textarea>
                </div>

                <div class="zoom-controls">
                    <button class="btn btn-secondary btn-icon" id="zoom-out">−</button>
                    <span class="zoom-value" id="zoom-value">100%</span>
                    <button class="btn btn-secondary btn-icon" id="zoom-in">+</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="extract-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">✏️ Texto extraído — Página <span id="extract-page-num">1</span></h2>
                <button class="modal-close" onclick="closeExtractModal()">✕</button>
            </div>
            <textarea class="text-area" id="extracted-text" readonly></textarea>
            <div style="display:flex; gap:0.5rem; justify-content:center; flex-wrap:wrap;">
                <button class="btn btn-primary" onclick="copyExtractedText()">📋 Copiar tudo</button>
                <button class="btn btn-secondary" onclick="downloadExtractedText()">💾 Salvar .txt</button>
            </div>        </div>
    </div>

    <div class="toast" id="toast">
        <span id="toast-message">Operação realizada com sucesso!</span>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // State
        let pdfDoc = null;
        let currentPage = 1;
        let scale = 1.0;
        let currentTool = 'pen';
        let isEditing = false;
        let isDrawing = false;
        let lastX = 0, lastY = 0;
        let annotations = {};
        let undoStack = [];
        let startX = 0, startY = 0;
        let textLines = [];
        let currentHighlightLine = null;
        let highlightedRanges = [];

        // Elements
        const fileInput = document.getElementById('file-input');
        const emptyState = document.getElementById('empty-state');
        const loading = document.getElementById('loading');
        const pdfWrapper = document.getElementById('pdf-wrapper');
        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        const annotationCanvas = document.getElementById('annotation-canvas');
        const annCtx = annotationCanvas.getContext('2d');
        const textLayer = document.getElementById('text-layer');
        const annotationToolbar = document.getElementById('annotation-toolbar');
        const pageContainer = document.getElementById('page-container');

        function isMobile() {
            return window.innerWidth <= 768 || 'ontouchstart' in window;
        }

        function getOptimalScale() {
            const containerWidth = pageContainer.parentElement.clientWidth - 40;
            if (isMobile()) return Math.min(1.2, containerWidth / 600);
            return 1.0;
        }

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];            if (file && file.type === 'application/pdf') await loadPDF(file);
        });

        async function loadPDF(file) {
            showLoading();
            try {
                const arrayBuffer = await file.arrayBuffer();
                pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                emptyState.style.display = 'none';
                pdfWrapper.classList.add('active');
                document.getElementById('total-pages').textContent = pdfDoc.numPages;
                currentPage = 1;
                scale = getOptimalScale();
                await renderPage(currentPage);
                hideLoading();
                showToast('PDF carregado com sucesso!');
            } catch (error) {
                console.error(error);
                showToast('Erro ao carregar PDF', 'error');
                hideLoading();
            }
        }

        async function renderPage(num) {
            if (!pdfDoc) return;
            const page = await pdfDoc.getPage(num);
            const viewport = page.getViewport({ scale });
            
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            await page.render({ canvasContext: ctx, viewport }).promise;
            
            await renderTextLayer(page, viewport);
            await buildTextLines(page, viewport);
            
            document.getElementById('current-page').textContent = num;
            currentPage = num;
            
            setupAnnotationCanvas(viewport);
            loadAnnotationsForPage(num);
        }

        function setupAnnotationCanvas(viewport) {
            annotationCanvas.width = viewport.width;
            annotationCanvas.height = viewport.height;
            annCtx.clearRect(0, 0, annotationCanvas.width, annotationCanvas.height);
        }

        async function renderTextLayer(page, viewport) {
            textLayer.innerHTML = '';            const textContent = await page.getTextContent();
            
            textContent.items.forEach(item => {
                if (!item.str) return;
                const textDiv = document.createElement('span');
                textDiv.textContent = item.str;
                
                const tx = pdfjsLib.Util.transform(viewport.transform, item.transform);
                const angle = Math.atan2(tx[1], tx[0]);
                const fontSize = Math.sqrt(tx[2] * tx[2] + tx[3] * tx[3]);
                
                textDiv.style.left = `${tx[4]}px`;
                textDiv.style.top = `${tx[5] - fontSize}px`;
                textDiv.style.fontSize = `${fontSize}px`;
                
                if (angle !== 0) {
                    textDiv.style.transform = `rotate(${angle * 180 / Math.PI}deg)`;
                }
                
                textLayer.appendChild(textDiv);
            });
            
            textLayer.style.width = `${viewport.width}px`;
            textLayer.style.height = `${viewport.height}px`;
        }

        async function buildTextLines(page, viewport) {
            textLines = [];
            highlightedRanges = [];
            const textContent = await page.getTextContent();
            const lineMap = new Map();
            const yThreshold = 5;
            
            textContent.items.forEach(item => {
                if (!item.str || !item.str.trim()) return;
                const tx = pdfjsLib.Util.transform(viewport.transform, item.transform);
                const fontSize = Math.sqrt(tx[2] * tx[2] + tx[3] * tx[3]);
                const x = tx[4];
                const y = tx[5];
                
                let lineKey = null;
                for (const [key, line] of lineMap.entries()) {
                    if (Math.abs(line.y - y) < yThreshold) {
                        lineKey = key;
                        break;
                    }
                }
                
                if (lineKey === null) {
                    lineKey = y;                    lineMap.set(lineKey, { y: y, words: [] });
                }
                
                lineMap.get(lineKey).words.push({ x, y, str: item.str });
            });
            
            textLines = Array.from(lineMap.entries())
                .sort((a, b) => b[1].y - a[1].y)
                .map(([key, line]) => {
                    line.words.sort((a, b) => a.x - b.x);
                    return { y: line.y, words: line.words };
                });
        }

        function findLineAtY(cursorY) {
            if (textLines.length === 0) return null;
            let closest = null;
            let minDist = Infinity;
            
            textLines.forEach((line, idx) => {
                const dist = Math.abs(line.y - cursorY);
                if (dist < minDist) {
                    minDist = dist;
                    closest = { line, idx };
                }
            });
            
            return minDist < 50 ? closest : null;
        }

        // EDIT MODE
        const editBtn = document.getElementById('edit-btn');
        editBtn.addEventListener('click', () => {
            if (!pdfDoc) { 
                showToast('Abra um PDF primeiro'); 
                return; 
            }
            isEditing = !isEditing;
            if (isEditing) {
                annotationToolbar.classList.add('active');
                annotationCanvas.classList.add('active');
                pageContainer.classList.add('editing');
                editBtn.classList.add('active');
                showToast('Modo edição ativado!');
            } else {
                exitEditMode();
            }
        });

        function exitEditMode() {            isEditing = false;
            annotationToolbar.classList.remove('active');
            annotationCanvas.classList.remove('active');
            pageContainer.classList.remove('editing');
            editBtn.classList.remove('active');
            currentTool = 'pen';
            updateActiveToolUI();
        }

        document.getElementById('exit-edit').addEventListener('click', exitEditMode);

        // TOOL SELECTION - CORREÇÃO
        document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const targetBtn = e.currentTarget;
                const tool = targetBtn.dataset.tool;
                
                if (targetBtn.classList.contains('active')) {
                    // Desativa todos se já estiver ativo
                    document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
                    currentTool = null;
                    showToast('Ferramenta desativada');
                } else {
                    // Ativa apenas o clicado
                    document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
                    targetBtn.classList.add('active');
                    currentTool = tool;
                    
                    if (currentTool === 'highlight-line') {
                        document.getElementById('annotation-color').value = '#ffff00';
                    }
                }
            });
        });

        function updateActiveToolUI() {
            document.querySelectorAll('.tool-btn[data-tool]').forEach(b => {
                b.classList.toggle('active', b.dataset.tool === currentTool);
            });
        }

        const colorPicker = document.getElementById('annotation-color');
        const sizeSlider = document.getElementById('annotation-size');

        // DRAWING
        function getPos(e) {
            const rect = annotationCanvas.getBoundingClientRect();
            const scaleX = annotationCanvas.width / rect.width;
            const scaleY = annotationCanvas.height / rect.height;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        annotationCanvas.addEventListener('mousedown', startDraw);
        annotationCanvas.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            startDraw(e); 
        }, { passive: false });
        
        annotationCanvas.addEventListener('mousemove', draw);
        annotationCanvas.addEventListener('touchmove', (e) => { 
            e.preventDefault(); 
            draw(e); 
        }, { passive: false });
        
        annotationCanvas.addEventListener('mouseup', endDraw);
        annotationCanvas.addEventListener('touchend', endDraw);
        annotationCanvas.addEventListener('mouseleave', () => {
            isDrawing = false;
            currentHighlightLine = null;
        });

        function startDraw(e) {
            if (!isEditing || !currentTool) {
                if (!isEditing) showToast('Ative o modo edição primeiro');
                return;
            }
            
            const pos = getPos(e);

            if (currentTool === 'text') {
                showTextInput(pos.x, pos.y);
                return;
            }

            isDrawing = true;
            startX = pos.x;
            startY = pos.y;
            lastX = pos.x;
            lastY = pos.y;
            saveUndoState();

            if (currentTool === 'pen' || currentTool === 'underline') {
                annCtx.beginPath();
                annCtx.moveTo(pos.x, pos.y);
            } else if (currentTool === 'highlight-line') {                const lineInfo = findLineAtY(pos.y);
                if (lineInfo) {
                    currentHighlightLine = {
                        lineIdx: lineInfo.idx,
                        line: lineInfo.line,
                        startX: pos.x,
                        endX: pos.x
                    };
                    drawHighlightPreview();
                }
            } else if (currentTool === 'eraser') {
                eraseAt(pos.x, pos.y);
            }
        }

        function draw(e) {
            if (!isDrawing || !isEditing) return;
            
            const pos = getPos(e);
            const color = colorPicker.value;
            const size = parseInt(sizeSlider.value);

            if (currentTool === 'pen') {
                annCtx.strokeStyle = color;
                annCtx.lineWidth = size;
                annCtx.lineCap = 'round';
                annCtx.lineJoin = 'round';
                annCtx.globalAlpha = 1;
                annCtx.globalCompositeOperation = 'source-over';
                annCtx.lineTo(pos.x, pos.y);
                annCtx.stroke();
            } else if (currentTool === 'underline') {
                annCtx.strokeStyle = color;
                annCtx.lineWidth = Math.max(2, size * 0.5);
                annCtx.lineCap = 'round';
                annCtx.globalAlpha = 1;
                annCtx.globalCompositeOperation = 'source-over';
                annCtx.clearRect(0, 0, annotationCanvas.width, annotationCanvas.height);
                redrawAnnotations();
                annCtx.beginPath();
                annCtx.moveTo(startX, startY);
                annCtx.lineTo(pos.x, pos.y);
                annCtx.stroke();
            } else if (currentTool === 'highlight-line') {
                if (currentHighlightLine) {
                    currentHighlightLine.endX = pos.x;
                    drawHighlightPreview();
                }
            } else if (currentTool === 'eraser') {
                eraseAt(pos.x, pos.y);            }

            lastX = pos.x;
            lastY = pos.y;
        }

        function drawHighlightPreview() {
            if (!currentHighlightLine) return;
            
            annCtx.clearRect(0, 0, annotationCanvas.width, annotationCanvas.height);
            redrawAnnotations();
            
            const line = currentHighlightLine.line;
            const color = colorPicker.value;
            const size = parseInt(sizeSlider.value);
            const height = Math.max(size, 15);
            
            const x1 = Math.min(currentHighlightLine.startX, currentHighlightLine.endX);
            const x2 = Math.max(currentHighlightLine.startX, currentHighlightLine.endX);
            const y = line.y - height * 0.3;
            
            annCtx.globalCompositeOperation = 'source-over';
            annCtx.globalAlpha = 0.4;
            annCtx.fillStyle = color;
            annCtx.fillRect(x1, y, x2 - x1, height);
            annCtx.globalAlpha = 1;
        }

        function eraseAt(x, y) {
            const size = parseInt(sizeSlider.value);
            annCtx.globalCompositeOperation = 'destination-out';
            annCtx.beginPath();
            annCtx.arc(x, y, size, 0, Math.PI * 2);
            annCtx.fill();
            annCtx.globalCompositeOperation = 'source-over';
        }

        function endDraw(e) {
            if (!isDrawing) return;
            isDrawing = false;

            if (currentTool === 'highlight-line' && currentHighlightLine) {
                const x1 = Math.min(currentHighlightLine.startX, currentHighlightLine.endX);
                const x2 = Math.max(currentHighlightLine.startX, currentHighlightLine.endX);
                
                if (x2 - x1 > 5) {
                    highlightedRanges.push({
                        lineIdx: currentHighlightLine.lineIdx,
                        startX: x1,
                        endX: x2,                        color: colorPicker.value,
                        size: parseInt(sizeSlider.value)
                    });
                    
                    if (!annotations[currentPage]) annotations[currentPage] = [];
                    annotations[currentPage].push({
                        tool: 'highlight-line',
                        lineIdx: currentHighlightLine.lineIdx,
                        startX: x1,
                        endX: x2,
                        color: colorPicker.value,
                        size: parseInt(sizeSlider.value)
                    });
                }
                
                currentHighlightLine = null;
                redrawAllAnnotations();
            } else if (currentTool === 'pen' || currentTool === 'underline') {
                if (!annotations[currentPage]) annotations[currentPage] = [];
                annotations[currentPage].push({
                    tool: currentTool,
                    color: colorPicker.value,
                    size: parseInt(sizeSlider.value),
                    startX, startY,
                    endX: lastX, endY: lastY
                });
            }

            redrawAllAnnotations();
        }

        function redrawAnnotations() {
            const pageAnnotations = annotations[currentPage] || [];
            
            pageAnnotations.forEach(ann => {
                if (ann.tool === 'eraser') return;
                
                annCtx.strokeStyle = ann.color;
                annCtx.lineWidth = ann.size;
                annCtx.lineCap = 'round';
                annCtx.lineJoin = 'round';
                annCtx.globalAlpha = 1;
                annCtx.globalCompositeOperation = 'source-over';
                annCtx.beginPath();

                if (ann.tool === 'pen' || ann.tool === 'underline') {
                    annCtx.moveTo(ann.startX, ann.startY);
                    annCtx.lineTo(ann.endX, ann.endY);
                    annCtx.stroke();
                }            });
        }

        function redrawAllAnnotations() {
            annCtx.clearRect(0, 0, annotationCanvas.width, annotationCanvas.height);
            
            highlightedRanges.forEach(range => {
                const line = textLines[range.lineIdx];
                if (!line) return;
                const height = Math.max(range.size, 15);
                const y = line.y - height * 0.3;
                
                annCtx.globalCompositeOperation = 'source-over';
                annCtx.globalAlpha = 0.4;
                annCtx.fillStyle = range.color;
                annCtx.fillRect(range.startX, y, range.endX - range.startX, height);
                annCtx.globalAlpha = 1;
            });
            
            redrawAnnotations();
        }

        function loadAnnotationsForPage(num) {
            highlightedRanges = (annotations[num] || [])
                .filter(a => a.tool === 'highlight-line')
                .map(a => ({ lineIdx: a.lineIdx, startX: a.startX, endX: a.endX, color: a.color, size: a.size }));
            
            redrawAllAnnotations();
        }

        function showTextInput(x, y) {
            const text = prompt('Digite o texto:');
            if (text) {
                saveUndoState();
                if (!annotations[currentPage]) annotations[currentPage] = [];
                annotations[currentPage].push({
                    tool: 'text', text, x, y,
                    color: colorPicker.value,
                    size: parseInt(sizeSlider.value)
                });
                redrawAllAnnotations();
                annCtx.fillStyle = colorPicker.value;
                annCtx.font = `${parseInt(sizeSlider.value)}px 'DM Sans', sans-serif`;
                annCtx.globalAlpha = 1;
                annCtx.globalCompositeOperation = 'source-over';
                annCtx.fillText(text, x, y);
                showToast('Texto adicionado!');
            }
        }
        function saveUndoState() {
            undoStack.push({
                annotations: JSON.parse(JSON.stringify(annotations[currentPage] || [])),
                highlightedRanges: JSON.parse(JSON.stringify(highlightedRanges)),
                canvasData: annCtx.getImageData(0, 0, annotationCanvas.width, annotationCanvas.height)
            });
            if (undoStack.length > 30) undoStack.shift();
        }

        document.getElementById('undo-btn').addEventListener('click', () => {
            if (undoStack.length === 0) { 
                showToast('Nada para desfazer'); 
                return; 
            }
            const state = undoStack.pop();
            annotations[currentPage] = state.annotations;
            highlightedRanges = state.highlightedRanges;
            annCtx.putImageData(state.canvasData, 0, 0);
            showToast('Desfeito!');
        });

        document.getElementById('clear-btn').addEventListener('click', () => {
            if (confirm('Limpar todas as anotações desta página?')) {
                saveUndoState();
                annotations[currentPage] = [];
                highlightedRanges = [];
                annCtx.clearRect(0, 0, annotationCanvas.width, annotationCanvas.height);
                showToast('Anotações limpas!');
            }
        });

        document.getElementById('save-annotations').addEventListener('click', () => {
            try {
                localStorage.setItem('pdf-annotations', JSON.stringify(annotations));
                showToast('Anotações salvas!');
            } catch (e) { 
                showToast('Erro ao salvar'); 
            }
        });

        try {
            const data = localStorage.getItem('pdf-annotations');
            if (data) annotations = JSON.parse(data);
        } catch (e) {}

        // PAGE NAVIGATION
        document.getElementById('prev-page').addEventListener('click', () => {
            if (currentPage > 1) renderPage(currentPage - 1);
        });
                document.getElementById('next-page').addEventListener('click', () => {
            if (pdfDoc && currentPage < pdfDoc.numPages) renderPage(currentPage + 1);
        });

        // ZOOM
        document.getElementById('zoom-in').addEventListener('click', () => { 
            scale += 0.25; 
            updateZoom(); 
        });
        
        document.getElementById('zoom-out').addEventListener('click', () => { 
            if (scale > 0.5) { 
                scale -= 0.25; 
                updateZoom(); 
            } 
        });
        
        function updateZoom() {
            document.getElementById('zoom-value').textContent = `${Math.round(scale * 100)}%`;
            renderPage(currentPage);
        }

        // SEARCH
        const searchInput = document.getElementById('search-input');
        searchInput.addEventListener('input', debounce(async (e) => {
            if (!pdfDoc) return;
            const query = e.target.value.trim();
            if (query.length < 2) return;
            
            for (let p = 1; p <= pdfDoc.numPages; p++) {
                const page = await pdfDoc.getPage(p);
                const tc = await page.getTextContent();
                const text = tc.items.map(i => i.str).join(' ');
                if (text.toLowerCase().includes(query.toLowerCase())) {
                    if (p !== currentPage) {
                        currentPage = p;
                        await renderPage(p);
                        showToast(`Encontrado na página ${p}`);
                    }
                    break;
                }
            }
        }, 500));

        // COPY TEXT
        document.getElementById('copy-text-btn').addEventListener('click', async () => {
            if (!pdfDoc) { 
                showToast('Abra um PDF primeiro'); 
                return; 
            }            const page = await pdfDoc.getPage(currentPage);
            const tc = await page.getTextContent();
            const text = tc.items.map(i => i.str).join(' ');
            
            try {
                await navigator.clipboard.writeText(text);
                showToast('Texto copiado!');
            } catch (e) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('Texto copiado!');
            }
        });

        editBtn.addEventListener('dblclick', async () => {
            if (!pdfDoc) { 
                showToast('Abra um PDF primeiro'); 
                return; 
            }
            const page = await pdfDoc.getPage(currentPage);
            const tc = await page.getTextContent();
            const text = tc.items.map(i => i.str).join(' ');
            document.getElementById('extracted-text').value = text;
            document.getElementById('extract-page-num').textContent = currentPage;
            document.getElementById('extract-modal').classList.add('active');
        });

        function closeExtractModal() { 
            document.getElementById('extract-modal').classList.remove('active'); 
        }
        
        function copyExtractedText() {
            const text = document.getElementById('extracted-text').value;
            navigator.clipboard.writeText(text).then(() => {
                showToast('Texto copiado!');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('Texto copiado!');
            });        }
        
        function downloadExtractedText() {
            const text = document.getElementById('extracted-text').value;
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; 
            a.download = `pagina-${currentPage}.txt`;
            a.click(); 
            URL.revokeObjectURL(url);
            showToast('Arquivo salvo!');
        }

        document.getElementById('download-btn').addEventListener('click', () => {
            showToast('Funcionalidade em desenvolvimento');
        });

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'f') { 
                e.preventDefault(); 
                searchInput.focus(); 
            }
            if (e.ctrlKey && e.key === 'z' && isEditing) {
                e.preventDefault();
                document.getElementById('undo-btn').click();
            }
            if (e.key === 'Escape' && isEditing) {
                exitEditMode();
            }
        });

        function showLoading() { 
            loading.classList.add('active'); 
            emptyState.style.display = 'none'; 
            pdfWrapper.classList.remove('active'); 
        }
        
        function hideLoading() { 
            loading.classList.remove('active'); 
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        function debounce(func, wait) {            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func(...args), wait);
            };
        }

        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                if (pdfDoc) { 
                    scale = getOptimalScale(); 
                    renderPage(currentPage); 
                }
            }, 250);
        });

        // Prevenir zoom em double-tap em dispositivos móveis
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
        }
    </script>
</body>
</html>
