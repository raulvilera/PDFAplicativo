<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDF·Leitor</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --primary: #00d4ff;
            --primary-dark: #0099cc;
            --secondary: #00a8e8;
            --accent: #0077b6;
            --bg-dark: #000000;
            --bg-card: #0a0a0a;
            --bg-elevated: #1a1a1a;
            --bg-surface: #111111;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border: #2a2a2a;
            --success: #00d4ff;
            --warning: #fbbf24;
            --error: #ef4444;
            --gradient-header: linear-gradient(135deg, #000000 0%, #003d66 50%, #00a8e8 100%);
            --gradient-button: linear-gradient(135deg, #0077b6 0%, #00d4ff 100%);
            --gradient-card: linear-gradient(145deg, #0a0a0a 0%, #1a1a1a 100%);
        }

        html, body { overflow-x: hidden; width: 100%; height: 100%; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse at top left, rgba(0, 168, 232, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(0, 119, 182, 0.03) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }

        .app-header {
            background: var(--gradient-header);
            padding: 0.75rem 1rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6), 0 0 30px rgba(0,168,232,0.15);
            border-bottom: 1px solid rgba(0,212,255,0.2);
            margin: 0.5rem;
            border-radius: 16px;
        }

        .header-content { max-width: 1400px; margin: 0 auto; }
        .logo-3d { display: flex; align-items: center; gap: 0.75rem; }

        .logo-icon {
            width: 45px; height: 45px;
            background: linear-gradient(135deg, #000000 0%, #003d66 50%, #00a8e8 100%);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4), 0 0 20px rgba(0,212,255,0.2);
            border: 1px solid rgba(0,212,255,0.2);
            flex-shrink: 0;
        }

        .logo-text {
            font-size: 1.3rem; font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .main-container { max-width: 1400px; margin: 0 auto; padding: 0.75rem; position: relative; z-index: 1; }

        .toolbar {
            background: var(--gradient-card);
            border-radius: 12px; padding: 0.75rem;
            margin-bottom: 0.75rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            display: flex; flex-wrap: wrap; gap: 0.5rem;
            align-items: center; justify-content: space-between;
        }

        .toolbar-group { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }

        .btn {
            padding: 0.6rem 1rem; border: none; border-radius: 10px;
            font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.85rem;
            cursor: pointer; transition: all 0.3s ease;
            display: inline-flex; align-items: center; gap: 0.4rem;
            touch-action: manipulation; min-height: 44px;
        }

        .btn-primary { background: var(--gradient-button); color: #000; font-weight: 700; }
        .btn-primary:active { transform: scale(0.95); }

        .btn-secondary { background: var(--bg-elevated); color: var(--text-primary); border: 1px solid var(--border); }
        .btn-secondary:active { background: var(--bg-surface); transform: scale(0.95); }
        .btn-secondary.active { background: rgba(0,212,255,0.15); border-color: var(--primary); color: var(--primary); }

        .btn-icon { padding: 0.6rem; border-radius: 10px; width: 44px; height: 44px; justify-content: center; }

        .search-container { position: relative; flex: 1; min-width: 200px; max-width: 400px; }

        .search-input {
            width: 100%; padding: 0.6rem 0.8rem 0.6rem 2.5rem;
            border: 2px solid var(--border); border-radius: 10px;
            background: var(--bg-elevated); color: var(--text-primary);
            font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
        }
        .search-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,212,255,0.1); }
        .search-input::placeholder { color: var(--text-secondary); }
        .search-icon { position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); color: var(--primary); }

        .viewer-container {
            background: var(--gradient-card);
            border-radius: 12px; padding: 0.75rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            min-height: 600px; position: relative; overflow: hidden;
        }

        .empty-state { text-align: center; padding: 2rem 1rem; color: var(--text-secondary); }
        .empty-icon { font-size: 3.5rem; margin-bottom: 1rem; opacity: 0.5; }
        .empty-title { font-size: 1.2rem; margin-bottom: 0.75rem; color: var(--text-primary); }
        .empty-state strong { color: var(--primary); }

        .pdf-wrapper { display: none; flex-direction: column; align-items: center; gap: 1rem; width: 100%; }
        .pdf-wrapper.active { display: flex; }

        .page-nav-overlay {
            position: sticky; top: 0.5rem; z-index: 100;
            display: flex; align-items: center; justify-content: center; gap: 0.75rem;
            padding: 0.5rem 1rem;
            background: rgba(10,10,10,0.85);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            border: 1px solid rgba(0,212,255,0.3);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            width: fit-content; margin: 0 auto;
        }

        .page-nav-overlay .btn-icon {
            background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.3);
            color: var(--primary); width: 40px; height: 40px;
            font-size: 1.3rem; display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .page-nav-overlay .btn-icon:active { background: rgba(0,212,255,0.3); transform: scale(0.95); }
        .page-nav-overlay .page-info { font-family: 'Space Mono', monospace; color: var(--text-primary); font-size: 0.9rem; font-weight: 600; min-width: 90px; text-align: center; }
        .page-nav-overlay .page-info span { color: var(--primary); }

        .page-container {
            position: relative;
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6), 0 0 30px rgba(0,212,255,0.1);
            overflow: hidden;
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
        }

        #pdf-canvas { display: block; width: 100% !important; height: auto !important; max-width: 100%; }

        .text-layer {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden; line-height: 1.0;
            pointer-events: auto; opacity: 1;
        }

        .text-layer span {
            position: absolute;
            color: transparent !important;
            white-space: pre;
            cursor: text;
            transform-origin: 0% 0%;
            user-select: text;
            -webkit-user-select: text;
        }

        .text-layer span::selection,
        .text-layer span::-moz-selection {
            background: rgba(0, 212, 255, 0.4) !important;
            color: transparent !important;
        }

        #annotation-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            cursor: crosshair;
            display: none;
            touch-action: none;
        }

        #annotation-canvas.active { display: block; }
        #annotation-canvas.eraser-cursor { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="white" stroke-width="2"/></svg>') 12 12, auto; }
        #annotation-canvas.highlight-cursor { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><rect x="2" y="8" width="20" height="8" fill="rgba(255,255,0,0.5)" stroke="white" stroke-width="1"/></svg>') 12 12, auto; }

        .page-container.editing { user-select: none; }
        .page-container.editing #annotation-canvas { display: block; }
        .page-container.editing .text-layer { pointer-events: none; }

        .annotation-toolbar {
            background: var(--bg-elevated);
            border-radius: 12px; padding: 0.75rem;
            display: none; gap: 0.5rem;
            align-items: center; flex-wrap: wrap;
            border: 1px solid rgba(0,212,255,0.3);
            box-shadow: 0 0 20px rgba(0,212,255,0.1);
            margin-bottom: 0.75rem;
        }

        .annotation-toolbar.active { display: flex; }

        .tool-group {
            display: flex; gap: 0.4rem; align-items: center;
            padding-right: 0.5rem;
            border-right: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .tool-group:last-child { border-right: none; }

        .tool-btn {
            padding: 0.5rem 0.75rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-primary);
            cursor: pointer; transition: all 0.3s;
            font-size: 0.75rem;
            display: flex; align-items: center; gap: 0.3rem;
            min-height: 40px;
            touch-action: manipulation;
        }
        .tool-btn:active { transform: scale(0.95); }
        .tool-btn.active { background: var(--gradient-button); border-color: var(--primary); color: #000; font-weight: 600; }

        .color-picker { width: 40px; height: 40px; border: 2px solid var(--border); border-radius: 8px; cursor: pointer; background: transparent; }
        .size-slider { width: 80px; accent-color: var(--primary); }

        .zoom-controls {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(26,26,26,0.9);
            backdrop-filter: blur(10px);
            border-radius: 10px; border: 1px solid var(--border);
        }
        .zoom-value { min-width: 60px; text-align: center; font-family: 'Space Mono', monospace; font-size: 0.85rem; color: var(--primary); }

        .text-input-overlay {
            position: absolute;
            background: rgba(0,0,0,0.8);
            border: 2px dashed var(--primary);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            font-size: 16px; padding: 8px;
            min-width: 150px; outline: none; z-index: 50;
            display: none; box-shadow: 0 0 10px rgba(0,212,255,0.3);
            border-radius: 4px;
        }
        .text-input-overlay.active { display: block; }

        .modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9); z-index: 2000;
            align-items: center; justify-content: center; padding: 1rem;
        }
        .modal.active { display: flex; }

        .modal-content {
            background: var(--gradient-card); border-radius: 16px; padding: 1.5rem;
            max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 40px rgba(0,212,255,0.1);
            position: relative;
        }
        .modal-content::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: var(--gradient-button); border-radius: 16px 16px 0 0;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .modal-title { font-size: 1.2rem; font-weight: 600; color: var(--primary); }
        .modal-close {
            background: none; border: none; color: var(--text-secondary);
            font-size: 1.5rem; cursor: pointer; padding: 0.4rem;
            width: 40px; height: 40px; border-radius: 8px;
        }
        .modal-close:active { background: var(--bg-elevated); color: var(--primary); }

        .text-area {
            width: 100%; min-height: 200px; padding: 0.75rem;
            border: 1px solid var(--border); border-radius: 8px;
            background: var(--bg-elevated); color: var(--text-primary);
            font-family: 'Space Mono', monospace; font-size: 0.85rem;
            resize: vertical; margin-bottom: 1rem;
        }

        .loading { display: none; text-align: center; padding: 2rem; }
        .loading.active { display: block; }
        .spinner {
            width: 45px; height: 45px;
            border: 3px solid var(--border); border-top-color: var(--primary);
            border-radius: 50%; animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast {
            position: fixed; bottom: 1rem; right: 1rem; left: 1rem;
            background: var(--bg-elevated); color: var(--text-primary);
            padding: 0.85rem 1.25rem; border-radius: 10px;
            border: 1px solid var(--primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 0 20px rgba(0,212,255,0.2);
            display: none; align-items: center; gap: 0.75rem; z-index: 3000;
            animation: slideIn 0.3s ease;
            max-width: 400px; margin: 0 auto;
        }
        .toast.show { display: flex; }
        @keyframes slideIn { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .toast-icon { font-size: 1.2rem; color: var(--primary); }

        #file-input { display: none; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        @media (max-width: 768px) {
            .app-header { padding: 0.6rem 0.75rem; margin: 0.25rem; border-radius: 12px; }
            .logo-text { font-size: 1.1rem; }
            .logo-icon { width: 38px; height: 38px; font-size: 1.4rem; }
            .main-container { padding: 0.5rem; }
            .toolbar { padding: 0.6rem; gap: 0.4rem; }
            .btn { padding: 0.5rem 0.8rem; font-size: 0.8rem; min-height: 40px; }
            .btn-icon { width: 40px; height: 40px; }
            .search-container { min-width: 100%; order: -1; flex-basis: 100%; }
            .viewer-container { padding: 0.5rem; min-height: 400px; }
            .page-nav-overlay { padding: 0.4rem 0.75rem; gap: 0.5rem; }
            .page-nav-overlay .btn-icon { width: 36px; height: 36px; font-size: 1.1rem; }
            .page-nav-overlay .page-info { font-size: 0.8rem; min-width: 80px; }
            .annotation-toolbar { padding: 0.5rem; gap: 0.4rem; }
            .tool-btn { padding: 0.4rem 0.6rem; font-size: 0.7rem; min-height: 36px; }
            .zoom-controls { padding: 0.4rem 0.75rem; }
            .modal-content { padding: 1rem; }
            .modal-title { font-size: 1rem; }
            .toast { bottom: 0.5rem; left: 0.5rem; right: 0.5rem; }
        }

        @media (max-width: 480px) {
            .logo-text { font-size: 1rem; }
            .logo-icon { width: 35px; height: 35px; font-size: 1.2rem; }
            .btn { padding: 0.5rem 0.6rem; font-size: 0.75rem; }
            .btn span { display: none; }
            .tool-btn { font-size: 0.65rem; padding: 0.3rem 0.5rem; }
            .tool-btn span { display: none; }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            .app-header { padding: 0.4rem 0.75rem; }
            .viewer-container { min-height: 300px; }
        }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <div class="logo-3d">
                <div class="logo-icon">📖</div>
                <div class="logo-text">PDF·Leitor</div>
            </div>
        </div>
    </header>

    <div class="main-container">
        <div class="toolbar">
            <div class="toolbar-group">
                <input type="file" id="file-input" accept=".pdf">
                <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">
                     <span>Abrir PDF</span>
                </button>
            </div>
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="search-input" placeholder="Pesquisar... (Ctrl+F)">
            </div>
            <div class="toolbar-group">
                <button class="btn btn-secondary btn-icon" id="copy-text-btn" title="Copiar texto">📋</button>
                <button class="btn btn-secondary btn-icon" id="edit-btn" title="Editar / Anotar">✏️</button>
                <button class="btn btn-secondary btn-icon" id="download-btn" title="Baixar PDF">⬇</button>
            </div>
        </div>

        <div class="annotation-toolbar" id="annotation-toolbar">
            <div class="tool-group">
                <button class="tool-btn active" data-tool="pen">🖊️ <span>Caneta</span></button>
                <button class="tool-btn" data-tool="highlight-line">🖍️ <span>Realçar Linha</span></button>
                <button class="tool-btn" data-tool="underline">✏️ <span>Sublinhar</span></button>
                <button class="tool-btn" data-tool="text"> <span>Texto</span></button>
                <button class="tool-btn" data-tool="eraser">🧽 <span>Borracha</span></button>
            </div>
            <div class="tool-group">
                <input type="color" class="color-picker" id="annotation-color" value="#ffff00">
                <input type="range" class="size-slider" id="annotation-size" min="1" max="30" value="15">
                <span id="size-label" style="font-size: 0.75rem; color: var(--text-secondary); min-width: 25px;">15</span>
            </div>
            <div class="tool-group">
                <button class="tool-btn" id="undo-btn">↩️ <span>Desfazer</span></button>
                <button class="tool-btn" id="clear-btn">🗑️ <span>Limpar</span></button>
                <button class="btn btn-primary" id="save-annotations">💾 <span>Salvar</span></button>
                <button class="btn btn-secondary" id="exit-edit">✕ <span>Sair</span></button>
            </div>
        </div>

        <div class="viewer-container">
            <div class="empty-state" id="empty-state">
                <div class="empty-icon">📂</div>
                <div class="empty-title">Nenhum PDF aberto</div>
                <p>Toque em <strong>+ Abrir PDF</strong> para carregar arquivos do seu dispositivo.</p>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Carregando PDF…</p>
            </div>

            <div class="pdf-wrapper" id="pdf-wrapper">
                <div class="page-nav-overlay">
                    <button class="btn-icon" id="prev-page">‹</button>
                    <div class="page-info"><span id="current-page">1</span> / <span id="total-pages">—</span></div>
                    <button class="btn-icon" id="next-page">›</button>
                </div>

                <div class="page-container" id="page-container">
                    <canvas id="pdf-canvas"></canvas>
                    <canvas id="annotation-canvas"></canvas>
                    <div class="text-layer" id="text-layer"></div>
                    <textarea class="text-input-overlay" id="text-input-overlay" placeholder="Digite aqui..."></textarea>
                </div>

                <div class="zoom-controls">
                    <button class="btn btn-secondary btn-icon" id="zoom-out">−</button>
                    <span class="zoom-value" id="zoom-value">100%</span>
                    <button class="btn btn-secondary btn-icon" id="zoom-in">+</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="extract-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">✏️ Texto extraído — Página <span id="extract-page-num">1</span></h2>
                <button class="modal-close" onclick="closeExtractModal()">✕</button>
            </div>
            <textarea class="text-area" id="extracted-text" readonly></textarea>
            <div class="toolbar-group" style="justify-content: center;">
                <button class="btn btn-primary" onclick="copyExtractedText()"> Copiar tudo</button>
                <button class="btn btn-secondary" onclick="downloadExtractedText()">💾 Salvar .txt</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <span class="toast-icon">✓</span>
        <span id="toast-message">Operação realizada com sucesso!</span>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // State
        let pdfDoc = null;
        let currentPage = 1;
        let scale = 1.0;
        let currentTool = 'pen';
        let isEditing = false;
        let isDrawing = false;
        let lastX = 0, lastY = 0;
        let annotations = {};
        let undoStack = [];
        let startX = 0, startY = 0;
        
        // Text line data for smart highlight
        let textLines = []; // [{y, minX, maxX, words: [{x, y, w, h, str}]}]
        let currentHighlightLine = null;
        let highlightedRanges = []; // [{lineIndex, startX, endX, color, size}]

        // Elements
        const fileInput = document.getElementById('file-input');
        const emptyState = document.getElementById('empty-state');
        const loading = document.getElementById('loading');
        const pdfWrapper = document.getElementById('pdf-wrapper');
        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        const annotationCanvas = document.getElementById('annotation-canvas');
        const annCtx = annotationCanvas.getContext('2d');
        const textLayer = document.getElementById('text-layer');
        const annotationToolbar = document.getElementById('annotation-toolbar');
        const pageContainer = document.getElementById('page-container');
        const textInputOverlay = document.getElementById('text-input-overlay');
        const sizeLabel = document.getElementById('size-label');

        function isMobile() {
            return window.innerWidth <= 768 || 'ontouchstart' in window;
        }

        function getOptimalScale() {
            const containerWidth = pageContainer.parentElement.clientWidth - 40;
            if (isMobile()) return Math.min(1.5, containerWidth / 600);
            return 1.5;
        }

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file && file.type === 'application/pdf') await loadPDF(file);
        });

        async function loadPDF(file) {
            showLoading();
            try {
                const arrayBuffer = await file.arrayBuffer();
                pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                emptyState.style.display = 'none';
                pdfWrapper.classList.add('active');
                document.getElementById('total-pages').textContent = pdfDoc.numPages;
                currentPage = 1;
                scale = getOptimalScale();
                await renderPage(currentPage);
                hideLoading();
                showToast('PDF carregado com sucesso!');
            } catch (error) {
                console.error(error);
                showToast('Erro ao carregar PDF', 'error');
                hideLoading();
            }
        }

        async function renderPage(num) {
            if (!pdfDoc) return;
            const page = await pdfDoc.getPage(num);
            const viewport = page.getViewport({ scale });
            
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            await page.render({ canvasContext: ctx, viewport }).promise;
            
            await renderTextLayer(page, viewport);
            await buildTextLines(page, viewport);
            
            document.getElementById('current-page').textContent = num;
            currentPage = num;
            
            setupAnnotationCanvas(viewport);
            loadAnnotationsForPage(num);
        }

        function setupAnnotationCanvas(viewport) {
            annotationCanvas.width = viewport.width;
            annotationCanvas.height = viewport.height;
            annCtx.clearRect(0, 0, annotationCanvas.width, annotationCanvas.height);
        }

        async function renderTextLayer(page, viewport) {
            textLayer.innerHTML = '';
            const textContent = await page.getTextContent();
            
            textContent.items.forEach(item => {
                if (!item.str) return;
                const textDiv = document.createElement('span');
                textDiv.textContent = item.str;
                
                const tx = pdfjsLib.Util.transform(viewport.transform, item.transform);
                const angle = Math.atan2(tx[1], tx[0]);
                const fontSize = Math.sqrt(tx[2] * tx[2] + tx[3] * tx[3]);
                
                textDiv.style.left = `${tx[4]}px`;
                textDiv.style.top = `${tx[5] - fontSize}px`;
                textDiv.style.fontSize = `${fontSize}px`;
                textDiv.style.fontFamily = item.fontName || 'sans-serif';
                
                if (angle !== 0) {
                    textDiv.style.transform = `rotate(${angle * 180 / Math.PI}deg)`;
                }
                
                textLayer.appendChild(textDiv);
            });
            
            textLayer.style.width = `${viewport.width}px`;
            textLayer.style.height = `${viewport.height}px`;
        }

        // Build text lines for smart highlight
        async function buildTextLines(page, viewport) {
            textLines = [];
            highlightedRanges = [];
            const textContent = await page.getTextContent();
            
            // Group items by approximate Y coordinate (line)
            const lineMap = new Map();
            const yThreshold = 5; // pixels tolerance for same line
            
            textContent.items.forEach(item => {
                if (!item.str || !item.str.trim()) return;
                const tx = pdfjsLib.Util.transform(viewport.transform, item.transform);
                const fontSize = Math.sqrt(tx[2] * tx[2] + tx[3] * tx[3]);
                const x = tx[4];
                const y = tx[5]; // baseline Y
                const w = item.width * scale;
                const h = fontSize;
                
                // Find existing line or create new
                let lineKey = null;
                for (const [key, line] of lineMap.entries()) {
                    if (Math.abs(line.y - y) < yThreshold) {
                        lineKey = key;
                        break;
                    }
                }
                
                if (lineKey === null) {
                    lineKey = y;
                    lineMap.set(lineKey, { y: y, words: [] });
                }
                
                lineMap.get(lineKey).words.push({ x, y, w, h, str: item.str });
            });
            
            // Sort lines by Y (top to bottom) and words by X
            const sortedLines = Array.from(lineMap.entries())
                .sort((a, b) => b[1].y - a[1].y) // PDF Y is inverted
                .map(([key, line]) => {
                    line.words.sort((a, b) => a.x - b.x);
                    const minX = Math.min(...line.words.map(w => w.x));
                    const maxX = Math.max(...line.words.map(w => w.x + w.w));
                    return { y: line.y, minX, maxX, words: line.words };
                });
            
            textLines = sortedLines;
        }

        function findLineAtY(cursorY) {
            if (textLines.length === 0) return null;
            
            let closest = null;
            let minDist = Infinity;
            
            textLines.forEach((line, idx) => {
                const dist = Math.abs(line.y - cursorY);
                if (dist < minDist) {
                    minDist = dist;
                    closest = { line, idx };
                }
            });
            
            // Only return if reasonably close (within 30px)
            if (minDist < 50) return closest;
            return null;
        }

        // EDIT MODE
        const editBtn = document.getElementById('edit-btn');
        editBtn.addEventListener('click', () => {
            if (!pdfDoc) { showToast('Abra um PDF primeiro', 'warning'); return; }
            isEditing = !isEditing;
            if (isEditing) {
                annotationToolbar.classList.add('active');
                annotationCanvas.classList.add('active');
                pageContainer.classList.add('editing');
                editBtn.classList.add('active');
                updateCursorForTool();
                showToast('Modo edição ativado!');
            } else {
                exitEditMode();
            }
        });

        function exitEditMode() {
            isEditing = false;
            annotationToolbar.classList.remove('active');
            annotationCanvas.classList.remove('active');
            pageContainer.classList.remove('editing');
            editBtn.classList.remove('active');
            textInputOverlay.classList.remove('active');
            currentHighlightLine = null;
        }

        document.getElementById('exit-edit').addEventListener('click', exitEditMode);

        // TOOL SELECTION
        document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTool = btn.dataset.tool;
                updateCursorForTool();
                
                // Default color for highlight
                if (currentTool === 'highlight-line') {
                    document.getElementById('annotation-color').value = '#ffff00';
                }
            });
        });

        function updateCursorForTool() {
            annotationCanvas.classList.remove('eraser-cursor', 'highlight-cursor');
            if (currentTool === 'eraser') {
                annotationCanvas.classList.add('eraser-cursor');
            } else if (currentTool === 'highlight-line') {
                annotationCanvas.classList.add('highlight-cursor');
            }
        }

        const colorPicker = document.getElementById('annotation-color');
        const sizeSlider = document.getElementById('annotation-size');
        sizeSlider.addEventListener('input', () => {
            sizeLabel.textContent = sizeSlider.value;
        });

        // DRAWING
        function getPos(e) {
            const rect = annotationCanvas.getBoundingClientRect();
            const scaleX = annotationCanvas.width / rect.width;
            const scaleY = annotationCanvas.height / rect.height;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        annotationCanvas.addEventListener('mousedown', startDraw);
        annotationCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e); }, { passive: false });
        annotationCanvas.addEventListener('mousemove', draw);
        annotationCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); }, { passive: false });
        annotationCanvas.addEventListener('mouseup', endDraw);
        annotationCanvas.addEventListener('touchend', endDraw);
        annotationCanvas.addEventListener('mouseleave', endDraw);

        function startDraw(e) {
            if (!isEditing) return;
            const pos = getPos(e);

            if (currentTool === 'text') {
                showTextInput(pos.x, pos.y);
                return;
            }

            isDrawing = true;
            startX = pos.x;
            startY = pos.y;
            lastX = pos.x;
            lastY = pos.y;
            saveUndoState();

            if (currentTool === 'pen' || currentTool === 'underline') {
                annCtx.beginPath();
                annCtx.moveTo(pos.x, pos.y);
            } else if (currentTool === 'highlight-line') {
                // Start highlighting at cursor position
                const lineInfo = findLineAtY(pos.y);
                if (lineInfo) {
                    currentHighlightLine = {
                        lineIdx: lineInfo.idx,
                        line: lineInfo.line,
                        startX: pos.x,
                        endX: pos.x
                    };
                    drawHighlightPreview();
                }
            } else if (currentTool === 'eraser') {
                eraseAt(pos.x, pos.y);
            }
        }

        function draw(e) {
            if (!isDrawing || !isEditing) return;
            const pos = getPos(e);
            const color = colorPicker.value;
            const size = parseInt(sizeSlider.value);

            if (currentTool === 'pen') {
                annCtx.strokeStyle = color;
                annCtx.lineWidth = size;
                annCtx.lineCap = 'round';
                annCtx.lineJoin = 'round';
                annCtx.globalAlpha = 1;
                annCtx.globalCompositeOperation = 'source-over';
                annCtx.lineTo(pos.x, pos.y);
                annCtx.stroke();
            } else if (currentTool === 'underline') {
                annCtx.strokeStyle = color;
                annCtx.lineWidth = Math.max(2, size * 0.5);
                annCtx.lineCap = 'round';
                annCtx.globalAlpha = 1;
                annCtx.globalCompositeOperation = 'source-over';
                annCtx.clearRect(0, 0, annotationCanvas.width, annotationCanvas.height);
                redrawAnnotations();
                annCtx.beginPath();
                annCtx.moveTo(startX, startY);
                annCtx.lineTo(pos.x, pos.y);
                annCtx.stroke();
            } else if (currentTool === 'highlight-line') {
                if (currentHighlightLine) {
                    currentHighlightLine.endX = pos.x;
                    drawHighlightPreview();
                }
            } else if (currentTool === 'eraser') {
                eraseAt(pos.x, pos.y);
            }

            lastX = pos.x;
            lastY = pos.y;
        }

        function drawHighlightPreview() {
            if (!currentHighlightLine) return;
            
            // Redraw existing annotations first
            annCtx.clearRect(0, 0, annotationCanvas.width, annotationCanvas.height);
            redrawAnnotations();
            
            // Draw existing highlighted ranges for this line
            highlightedRanges.forEach(range => {
                if (range.lineIdx === currentHighlightLine.lineIdx) {
                    drawHighlightRect(range);
                }
            });
            
            // Draw current preview
            const line = currentHighlightLine.line;
            const color = colorPicker.value;
            const size = parseInt(sizeSlider.value);
            const height = Math.max(size, line.words[0]?.h || 15);
            
            const x1 = Math.min(currentHighlightLine.startX, currentHighlightLine.endX);
            const x2 = Math.max(currentHighlightLine.startX, currentHighlightLine.endX);
            const y = line.y - height * 0.3;
            
            annCtx.globalCompositeOperation = 'source-over';
            annCtx.globalAlpha = 0.4;
            annCtx.fillStyle = color;
            annCtx.fillRect(x1, y, x2 - x1, height);
            annCtx.globalAlpha = 1;
        }

        function drawHighlightRect(range) {
            const line = textLines[range.lineIdx];
            if (!line) return;
            const height = Math.max(range.size, line.words[0]?.h || 15);
            const y = line.y - height * 0.3;
            
            annCtx.globalCompositeOperation = 'source-over';
            annCtx.globalAlpha = 0.4;
            annCtx.fillStyle = range.color;
            annCtx.fillRect(range.startX, y, range.endX - range.startX, height);
            annCtx.globalAlpha = 1;
        }

        function eraseAt(x, y) {
            const size = parseInt(sizeSlider.value);
            annCtx.globalCompositeOperation = 'destination-out';
            annCtx.beginPath();
            annCtx.arc(x, y, size, 0, Math.PI * 2);
            annCtx.fill();
            annCtx.globalCompositeOperation = 'source-over';
        }

        function endDraw(e) {
            if (!isDrawing) return;
            isDrawing = false;

            if (currentTool === 'highlight-line' && currentHighlightLine) {
                // Save the highlighted range
                const x1 = Math.min(currentHighlightLine.startX, currentHighlightLine.endX);
                const x2 = Math.max(currentHighlightLine.startX, currentHighlightLine.endX);
                
                if (x2 - x1 > 5) { // minimum width
                    highlightedRanges.push({
                        lineIdx: currentHighlightLine.lineIdx,
                        startX: x1,
                        endX: x2,
                        color: colorPicker.value,
                        size: parseInt(sizeSlider.value)
                    });
                    
                    if (!annotations[currentPage]) annotations[currentPage] = [];
                    annotations[currentPage].push({
                        tool: 'highlight-line',
                        lineIdx: currentHighlightLine.lineIdx,
                        startX: x1,
                        endX: x2,
                        color: colorPicker.value,
                        size: parseInt(sizeSlider.value)
                    });
                }
                
                currentHighlightLine = null;
                redrawAllAnnotations();
            } else if (currentTool === 'pen' || currentTool === 'underline') {
                if (!annotations[currentPage]) annotations[currentPage] = [];
                annotations[currentPage].push({
                    tool: currentTool,
                    color: colorPicker.value,
                    size: parseInt(sizeSlider.value),
                    startX, startY,
                    endX: lastX, endY: lastY
                });
            } else if (currentTool === 'eraser') {
                // Eraser doesn't add to annotations, it modifies the canvas
                // We save the whole canvas state
                if (!annotations[currentPage]) annotations[currentPage] = [];
                annotations[currentPage].push({
                    tool: 'eraser',
                    canvasData: annCtx.getImageData(0, 0, annotationCanvas.width, annotationCanvas.height)
                });
            }
        }

        function redrawAnnotations() {
            const pageAnnotations = annotations[currentPage] || [];
            
            pageAnnotations.forEach(ann => {
                if (ann.tool === 'eraser') {
                    if (ann.canvasData) {
                        annCtx.putImageData(ann.canvasData, 0, 0);
                    }
                    return;
                }
                
                annCtx.strokeStyle = ann.color;
                annCtx.lineWidth = ann.size;
                annCtx.lineCap = 'round';
                annCtx.lineJoin = 'round';
                annCtx.globalAlpha = 1;
                annCtx.globalCompositeOperation = 'source-over';
                annCtx.beginPath();

                if (ann.tool === 'pen' || ann.tool === 'underline') {
                    annCtx.moveTo(ann.startX, ann.startY);
                    annCtx.lineTo(ann.endX, ann.endY);
                    annCtx.stroke();
                }
            });
        }

        function redrawAllAnnotations() {
            annCtx.clearRect(0, 0, annotationCanvas.width, annotationCanvas.height);
            
            // Draw highlighted ranges
            highlightedRanges.forEach(range => {
                drawHighlightRect(range);
            });
            
            // Draw other annotations
            const pageAnnotations = annotations[currentPage] || [];
            pageAnnotations.forEach(ann => {
                if (ann.tool === 'highlight-line') return; // already drawn
                if (ann.tool === 'eraser') {
                    if (ann.canvasData) annCtx.putImageData(ann.canvasData, 0, 0);
                    return;
                }
                
                annCtx.strokeStyle = ann.color;
                annCtx.lineWidth = ann.size;
                annCtx.lineCap = 'round';
                annCtx.lineJoin = 'round';
                annCtx.globalAlpha = 1;
                annCtx.globalCompositeOperation = 'source-over';
                annCtx.beginPath();

                if (ann.tool === 'pen' || ann.tool === 'underline') {
                    annCtx.moveTo(ann.startX, ann.startY);
                    annCtx.lineTo(ann.endX, ann.endY);
                    annCtx.stroke();
                }
            });
        }

        function loadAnnotationsForPage(num) {
            highlightedRanges = (annotations[num] || [])
                .filter(a => a.tool === 'highlight-line')
                .map(a => ({ lineIdx: a.lineIdx, startX: a.startX, endX: a.endX, color: a.color, size: a.size }));
            
            redrawAllAnnotations();
        }

        // TEXT INPUT
        function showTextInput(x, y) {
            textInputOverlay.style.left = x + 'px';
            textInputOverlay.style.top = y + 'px';
            textInputOverlay.style.color = colorPicker.value;
            textInputOverlay.style.fontSize = (parseInt(sizeSlider.value) * 0.8 + 10) + 'px';
            textInputOverlay.classList.add('active');
            textInputOverlay.value = '';
            textInputOverlay.focus();
        }

        textInputOverlay.addEventListener('blur', () => {
            const text = textInputOverlay.value.trim();
            if (text) {
                saveUndoState();
                const x = parseFloat(textInputOverlay.style.left);
                const y = parseFloat(textInputOverlay.style.top);
                if (!annotations[currentPage]) annotations[currentPage] = [];
                annotations[currentPage].push({
                    tool: 'text', text, x, y,
                    color: colorPicker.value,
                    size: parseInt(sizeSlider.value)
                });
                redrawAllAnnotations();
                // Draw text
                annCtx.fillStyle = colorPicker.value;
                annCtx.font = `${parseInt(sizeSlider.value) * 0.8 + 10}px 'DM Sans', sans-serif`;
                annCtx.globalAlpha = 1;
                annCtx.globalCompositeOperation = 'source-over';
                annCtx.fillText(text, x, y + parseInt(sizeSlider.value) * 0.8 + 10);
                showToast('Texto adicionado!');
            }
            textInputOverlay.classList.remove('active');
        });

        textInputOverlay.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                textInputOverlay.blur();
            }
        });

        // UNDO / CLEAR
        function saveUndoState() {
            undoStack.push({
                annotations: JSON.parse(JSON.stringify(annotations[currentPage] || [])),
                highlightedRanges: JSON.parse(JSON.stringify(highlightedRanges)),
                canvasData: annCtx.getImageData(0, 0, annotationCanvas.width, annotationCanvas.height)
            });
            if (undoStack.length > 30) undoStack.shift();
        }

        document.getElementById('undo-btn').addEventListener('click', () => {
            if (undoStack.length === 0) { showToast('Nada para desfazer', 'warning'); return; }
            const state = undoStack.pop();
            annotations[currentPage] = state.annotations;
            highlightedRanges = state.highlightedRanges;
            annCtx.putImageData(state.canvasData, 0, 0);
            showToast('Desfeito!');
        });

        document.getElementById('clear-btn').addEventListener('click', () => {
            if (confirm('Limpar todas as anotações desta página?')) {
                saveUndoState();
                annotations[currentPage] = [];
                highlightedRanges = [];
                annCtx.clearRect(0, 0, annotationCanvas.width, annotationCanvas.height);
                showToast('Anotações limpas!');
            }
        });

        document.getElementById('save-annotations').addEventListener('click', () => {
            try {
                localStorage.setItem('pdf-annotations', JSON.stringify(annotations));
                showToast('Anotações salvas!');
            } catch (e) { showToast('Erro ao salvar', 'error'); }
        });

        try {
            const data = localStorage.getItem('pdf-annotations');
            if (data) annotations = JSON.parse(data);
        } catch (e) {}

        // PAGE NAVIGATION
        document.getElementById('prev-page').addEventListener('click', () => {
            if (currentPage > 1) renderPage(currentPage - 1);
        });
        document.getElementById('next-page').addEventListener('click', () => {
            if (pdfDoc && currentPage < pdfDoc.numPages) renderPage(currentPage + 1);
        });

        // ZOOM
        document.getElementById('zoom-in').addEventListener('click', () => { scale += 0.25; updateZoom(); });
        document.getElementById('zoom-out').addEventListener('click', () => { if (scale > 0.5) { scale -= 0.25; updateZoom(); } });
        function updateZoom() {
            document.getElementById('zoom-value').textContent = `${Math.round(scale * 100)}%`;
            renderPage(currentPage);
        }

        // SEARCH
        const searchInput = document.getElementById('search-input');
        searchInput.addEventListener('input', debounce(async (e) => {
            if (!pdfDoc) return;
            const query = e.target.value.trim();
            if (query.length < 2) return;
            for (let p = 1; p <= pdfDoc.numPages; p++) {
                const page = await pdfDoc.getPage(p);
                const tc = await page.getTextContent();
                const text = tc.items.map(i => i.str).join(' ');
                if (text.toLowerCase().includes(query.toLowerCase())) {
                    if (p !== currentPage) {
                        currentPage = p;
                        await renderPage(p);
                        showToast(`Encontrado na página ${p}`);
                    }
                    break;
                }
            }
        }, 500));

        // COPY TEXT
        document.getElementById('copy-text-btn').addEventListener('click', async () => {
            if (!pdfDoc) { showToast('Abra um PDF primeiro', 'warning'); return; }
            const page = await pdfDoc.getPage(currentPage);
            const tc = await page.getTextContent();
            const text = tc.items.map(i => i.str).join(' ');
            
            try {
                await navigator.clipboard.writeText(text);
                showToast('Texto copiado!');
            } catch (e) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('Texto copiado!');
            }
        });

        editBtn.addEventListener('dblclick', async () => {
            if (!pdfDoc) { showToast('Abra um PDF primeiro', 'warning'); return; }
            const page = await pdfDoc.getPage(currentPage);
            const tc = await page.getTextContent();
            const text = tc.items.map(i => i.str).join(' ');
            document.getElementById('extracted-text').value = text;
            document.getElementById('extract-page-num').textContent = currentPage;
            document.getElementById('extract-modal').classList.add('active');
        });

        function closeExtractModal() { document.getElementById('extract-modal').classList.remove('active'); }
        
        function copyExtractedText() {
            const text = document.getElementById('extracted-text').value;
            navigator.clipboard.writeText(text).then(() => {
                showToast('Texto copiado!');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('Texto copiado!');
            });
        }
        
        function downloadExtractedText() {
            const text = document.getElementById('extracted-text').value;
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `pagina-${currentPage}.txt`;
            a.click(); URL.revokeObjectURL(url);
            showToast('Arquivo salvo!');
        }

        document.getElementById('download-btn').addEventListener('click', () => {
            showToast('Funcionalidade em desenvolvimento', 'warning');
        });

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'f') { e.preventDefault(); searchInput.focus(); }
            if (e.ctrlKey && e.key === 'z' && isEditing) {
                e.preventDefault();
                document.getElementById('undo-btn').click();
            }
            if (e.key === 'Escape' && isEditing) exitEditMode();
        });

        function showLoading() { loading.classList.add('active'); emptyState.style.display = 'none'; pdfWrapper.classList.remove('active'); }
        function hideLoading() { loading.classList.remove('active'); }
        function showToast(msg) {
            document.getElementById('toast-message').textContent = msg;
            document.getElementById('toast').classList.add('show');
            setTimeout(() => document.getElementById('toast').classList.remove('show'), 3000);
        }
        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func(...args), wait);
            };
        }

        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                if (pdfDoc) { scale = getOptimalScale(); renderPage(currentPage); }
            }, 250);
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
        }
    </script>
</body>
</html>
